  // All tasks related to this user: assigned_to, assigned_to_user, or created_by
  let tasks=allTasks().filter(t=>t.assigned_to_user===uid||t.assigned_to===uid||t.created_by===uid);
  if(UFilt.status) tasks=tasks.filter(t=>t.status===UFilt.status);
  if(UFilt.type)   tasks=tasks.filter(t=>t.type===UFilt.type);
  tasks.sort((a,b)=>{
    const p={High:0,Medium:1,Low:2};
    return p[a.priority]-p[b.priority]||new Date(a.due_date)-new Date(b.due_date);
  });

  const total=tasks.length;
  const done=tasks.filter(t=>t.status==='Verified').length;
  const pend=tasks.filter(t=>['Created','Assigned','In Progress'].includes(t.status)).length;
  const ov=tasks.filter(t=>overdue(t)).length;

  panel.innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;padding:12px 0 10px;border-bottom:1px solid var(--border);margin-bottom:12px">
      <div class="uav" style="background:${u.color}22;color:${u.color};border:1.5px solid ${u.color}33;width:36px;height:36px;font-size:13px">${u.avatar}</div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600;color:var(--t)">${u.name}</div>
        <div style="font-size:11px;color:var(--t3)">${u.email} · ${RL[u.role]}</div>
      </div>
      <div style="display:flex;gap:14px">
        <div style="text-align:center"><div style="font-size:18px;font-weight:700;color:var(--t);font-family:'DM Mono',monospace">${total}</div><div style="font-size:9px;color:var(--t3);text-transform:uppercase">Total</div></div>
        <div style="text-align:center"><div style="font-size:18px;font-weight:700;color:var(--green);font-family:'DM Mono',monospace">${done}</div><div style="font-size:9px;color:var(--t3);text-transform:uppercase">Verified</div></div>
        <div style="text-align:center"><div style="font-size:18px;font-weight:700;color:var(--amber);font-family:'DM Mono',monospace">${pend}</div><div style="font-size:9px;color:var(--t3);text-transform:uppercase">Pending</div></div>
        <div style="text-align:center"><div style="font-size:18px;font-weight:700;color:var(--red);font-family:'DM Mono',monospace">${ov}</div><div style="font-size:9px;color:var(--t3);text-transform:uppercase">Overdue</div></div>
      </div>
    </div>
    ${tasks.length?tasks.map(t=>taskCard(t)).join(''):`<div class="empty" style="padding:20px"><div class="empty-ic">◈</div><div class="empty-t">No tasks match this filter</div></div>`}`;
}

function openAddUser(){
  document.getElementById('mu-title').textContent='Add User';
  document.getElementById('user-save-btn').textContent='Add User';
  document.getElementById('user-save-btn').onclick=saveUser;
  ['u-name','u-email','u-pass'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('u-role').value='user';
  document.getElementById('modal-user').classList.add('on');
}

function openEditUser(id){
  const u=allUsers().find(x=>x.id===id); if(!u) return;
  document.getElementById('mu-title').textContent='Edit User';
  document.getElementById('user-save-btn').textContent='Save Changes';
  document.getElementById('user-save-btn').onclick=()=>doEditUser(id);
  document.getElementById('u-name').value=u.name;
  document.getElementById('u-email').value=u.email;
  document.getElementById('u-pass').value='';
  document.getElementById('u-role').value=u.role;
  document.getElementById('modal-user').classList.add('on');
}

async function doEditUser(id){
  const name=document.getElementById('u-name').value.trim();
  const email=document.getElementById('u-email').value.trim().toLowerCase();
  const pass=document.getElementById('u-pass').value;
  const role=document.getElementById('u-role').value;
  if(!name){ toast('Name required','er'); return; }
  if(!email){ toast('Email required','er'); return; }
  const payload={name,email,role};
  if(pass) payload.password=pass;
  const initials=name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  payload.avatar=initials;
  const {error}=await sb.from('users').update(payload).eq('id',id);
  if(error){ toast('Failed: '+error.message,'er'); return; }
  toast('User updated ✓'); closeM('modal-user');
  await refreshUsers(); renderUsers();
}

async function saveUser(){
  const name=document.getElementById('u-name').value.trim();
  const email=document.getElementById('u-email').value.trim().toLowerCase();
  const pass=document.getElementById('u-pass').value;
  const role=document.getElementById('u-role').value;
  if(!name){ toast('Name required','er'); return; }
  if(!email){ toast('Email required','er'); return; }
  if(!pass){ toast('Password required','er'); return; }
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ toast('Invalid email','er'); return; }
  if(allUsers().find(u=>u.email===email)){ toast('Email already registered','er'); return; }
  const initials=name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  const colors=['#3b7dd8','#9b72db','#22c98e','#c9a84c','#e05252','#06b6d4','#ec4899','#e8943a'];
  const color=colors[allUsers().length%colors.length];
  const btn=document.getElementById('user-save-btn');
  btn.disabled=true; btn.textContent='Adding…';
  const {error}=await sb.from('users').insert({name,email,password:pass,role,avatar:initials,color,active:true});
  btn.disabled=false; btn.textContent='Add User';
  if(error){ toast('Failed: '+error.message,'er'); return; }
  toast(`${name} added ✓`); closeM('modal-user');
  await refreshUsers(); renderUsers();
}

async function doToggleUser(id){
  const u=allUsers().find(x=>x.id===id); if(!u) return;
  const {error}=await sb.from('users').update({active:!u.active}).eq('id',id);
  if(error){ toast('Failed','er'); return; }
  toast(`${u.name} ${u.active?'deactivated':'activated'}`);
  await refreshUsers(); renderUsers();
}

async function doRemoveUser(id){
  const u=allUsers().find(x=>x.id===id);
  if(!confirm(`Remove ${u?.name||'this user'}? This cannot be undone.`)) return;
  const {error}=await sb.from('users').delete().eq('id',id);
  if(error){ toast('Failed: '+error.message,'er'); return; }
  toast('User removed');
  await refreshUsers(); renderUsers();
}

async function doChangePassword(){
  const old=document.getElementById('pw-old').value;
  const nw=document.getElementById('pw-new').value;
  const cf=document.getElementById('pw-conf').value;
  if(!old||!nw||!cf){ toast('All fields required','er'); return; }

  if(nw.length<6){ toast('Password must be at least 6 characters','er'); return; }
  // Verify current password
  const {data}=await sb.from('users').select('*').eq('id',CU.id).eq('password',old).single();

  toast('Password updated ✓');
  closeM('modal-pw');

}

function toast(msg,type='ok'){
  const el=document.createElement('div');
  el.className=`toast ${type}`;
  const icons={ok:'✓',er:'✕',in:'◈',wa:'⚠'};
  el.innerHTML=`<span class="toast-icon">${icons[type]||'✓'}</span> ${msg}`;
  document.getElementById('toast-wrap').appendChild(el);
  setTimeout(()=>{
    el.style.opacity='0'; el.style.transform='translateX(100%)';
    el.style.transition='all .3s';
    setTimeout(()=>el.remove(),300);
  },3200);
}

// ── Day Sheet filter state ──
let _dsState = { userId: null, filterDate: '', viewMonth: '' };

function renderDaySheet(){
  const el=document.getElementById('pg-daysheet'); if(!el) return;
  const now=new Date();
  const isSA=CU.role==='superadmin';
  // backDays=0 means only today; SA can set more via settings
  const backDays=isSA?(C.dsBackDays||0):0;

  // Init state defaults
  if(!_dsState.userId) _dsState.userId=CU.id;
  if(!_dsState.viewMonth) _dsState.viewMonth=now.toISOString().slice(0,7);

  // Build allowed entry dates (today only for users, SA gets backDays)
  const allowedDates=[];
  for(let i=0;i<=backDays;i++){
    const d=new Date(now); d.setDate(now.getDate()-i);
    allowedDates.push(d.toISOString().slice(0,10));
  }

  // Filter entries
  const viewUserId=isSA?parseInt(_dsState.userId||CU.id):CU.id;
  let entries=C.daySheet.filter(e=>e.user_id===viewUserId);

  if(_dsState.filterDate){
    entries=entries.filter(e=>e.entry_date===_dsState.filterDate);
  } else {
    entries=entries.filter(e=>e.entry_date.slice(0,7)===_dsState.viewMonth);
  }

  // Group by date
  const byDate={};
  entries.forEach(e=>{ if(!byDate[e.entry_date]) byDate[e.entry_date]=[]; byDate[e.entry_date].push(e); });

  // Dates to display
  let displayDates=[];
  if(_dsState.filterDate){
    displayDates=[_dsState.filterDate];
  } else {
    const existingDates=[...new Set(entries.map(e=>e.entry_date))].sort((a,b)=>b.localeCompare(a));
    const isCurrentMonth=_dsState.viewMonth===now.toISOString().slice(0,7);
    if(isCurrentMonth && viewUserId===CU.id){
      allowedDates.forEach(d=>{ if(!existingDates.includes(d)) existingDates.unshift(d); });
    }
    displayDates=[...new Set(existingDates)].sort((a,b)=>b.localeCompare(a));
  }

  const monthName=`${new Date(_dsState.viewMonth+'-01').toLocaleDateString('en-IN',{month:'short',year:'2-digit'})} Day Sheet`;

  const monthOpts=[0,1,2,3].map(i=>{
    const d=new Date(now); d.setMonth(now.getMonth()-i);
    const ym=d.toISOString().slice(0,7);
    return `<option value="${ym}" ${_dsState.viewMonth===ym?'selected':''}>${d.toLocaleDateString('en-IN',{month:'short',year:'numeric'})}</option>`;
  }).join('');

  const filterBar=`
    <div class="ds-filters" style="padding:12px 18px 0;flex-wrap:wrap;gap:10px">
      ${isSA?`<select onchange="_dsState.userId=this.value;_dsState.filterDate='';loadDsForUser(this.value)" style="min-width:160px">
        <option value="${CU.id}">My Entries</option>
        ${allUsers().filter(u=>u.id!==CU.id&&u.active).map(u=>`<option value="${u.id}" ${_dsState.userId==u.id?'selected':''}>${u.name}</option>`).join('')}
      </select>`:''}
      <select onchange="_dsState.viewMonth=this.value;_dsState.filterDate='';renderDaySheet()">${monthOpts}</select>
      <div style="display:flex;align-items:center;gap:6px">
        <label style="font-size:10px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.07em">Filter Date:</label>
        <input type="date" class="ds-sel" value="${_dsState.filterDate||''}"
          onchange="_dsState.filterDate=this.value;if(this.value)_dsState.viewMonth=this.value.slice(0,7);renderDaySheet()"
          style="padding:4px 8px;font-size:12px">
      </div>
      ${_dsState.filterDate?`<button class="btn bo btn-sm" onclick="_dsState.filterDate='';renderDaySheet()">✕ Clear Date</button>`:''}
    </div>`;

  const rows=displayDates.map(date=>{
    const dateEntries=byDate[date]||[];
    const isToday=date===today();
    const displayDate=new Date(date).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
    const canEnter=!isSA && allowedDates.includes(date) && viewUserId===CU.id;

    // Empty date — show blank entry row
    if(!dateEntries.length && canEnter){
      return `<tr class="${isToday?'ds-today':''}">
        <td style="font-size:11px;color:var(--t2);white-space:nowrap;font-family:'DM Mono',monospace;font-weight:${isToday?'700':'400'}">${displayDate}${isToday?' <span style="color:var(--gold);font-size:9px">TODAY</span>':''}</td>
        <td><input class="ds-inp" placeholder="Particular / Description…" id="ds-part-${date}-0"></td>
        <td><select class="ds-sel" id="ds-doc-${date}-0"><option value="YES">YES</option><option value="NO">NO</option></select></td>
        <td><input class="ds-url-inp" placeholder="Paste Drive URL…" id="ds-url-${date}-0"></td>
        <td><input class="ds-inp" placeholder="Bill / MF / GC No…" id="ds-ref-${date}-0"></td>
        <td><input class="ds-inp" placeholder="Remarks…" id="ds-rem-${date}-0"></td>
        <td><input class="ds-inp amount" placeholder="Amount" type="text" inputmode="decimal" id="ds-amt-${date}-0" oninput="this.value=this.value.replace(/[^0-9.]/g,'')"></td>
        <td><button class="ds-save-btn" onclick="saveDsRow('${date}',0)">Save</button></td>
      </tr>`;
    }

    if(!dateEntries.length){
      return `<tr>
        <td style="font-size:11px;color:var(--t2);white-space:nowrap;font-family:'DM Mono',monospace">${displayDate}</td>
        <td colspan="7" style="font-size:11px;color:var(--t4);font-style:italic;padding-left:8px">No entries</td>
      </tr>`;
    }

    // Existing entries — show all locked rows, then an extra blank row at bottom for new entry
    const newRowIdx = dateEntries.length; // unique index for the new input row
    const newEntryRow = canEnter ? `
      <tr class="${isToday?'ds-today':''}" style="background:var(--bg4)">
        <td style="font-size:10px;color:var(--t3);white-space:nowrap;font-family:'DM Mono',monospace">+ New</td>
        <td><input class="ds-inp" placeholder="Particular…" id="ds-part-${date}-${newRowIdx}"></td>
        <td><select class="ds-sel" id="ds-doc-${date}-${newRowIdx}"><option value="YES">YES</option><option value="NO">NO</option></select></td>
        <td><input class="ds-url-inp" placeholder="Drive URL…" id="ds-url-${date}-${newRowIdx}"></td>
        <td><input class="ds-inp" placeholder="Bill / MF / GC No…" id="ds-ref-${date}-${newRowIdx}"></td>
        <td><input class="ds-inp" placeholder="Remarks…" id="ds-rem-${date}-${newRowIdx}"></td>
        <td><input class="ds-inp amount" placeholder="Amount" type="text" inputmode="decimal" id="ds-amt-${date}-${newRowIdx}" oninput="this.value=this.value.replace(/[^0-9.]/g,'')"></td>
        <td><button class="ds-save-btn" onclick="saveDsRow('${date}',${newRowIdx})">Save</button></td>
      </tr>` : '';

    return dateEntries.map((e,idx)=>`
      <tr class="${isToday?'ds-today':''}" id="ds-row-${e.id}">
        <td style="font-size:11px;color:var(--t2);white-space:nowrap;font-family:'DM Mono',monospace;font-weight:${isToday?'700':'400'}">${idx===0?displayDate+(isToday?' <span style="color:var(--gold);font-size:9px">TODAY</span>':''):''}</td>
        <td>${isSA?`<input class="ds-inp" value="${(e.particular||'').replace(/"/g,'&quot;')}" onchange="updateDsField(${e.id},'particular',this.value)">`:`<span style="font-size:12px;color:var(--t)">${e.particular||'—'}</span>`}</td>
        <td>${isSA?`<select class="ds-sel" onchange="updateDsField(${e.id},'supported_doc',this.value)"><option ${e.supported_doc==='YES'?'selected':''}>YES</option><option ${e.supported_doc==='NO'?'selected':''}>NO</option></select>`:`<span class="bdg ${e.supported_doc==='YES'?'b-gr':'b-rd'}" style="font-size:10px">${e.supported_doc||'—'}</span>`}</td>
        <td>${isSA?`<input class="ds-url-inp" value="${(e.drive_link||'').replace(/"/g,'&quot;')}" onchange="updateDsField(${e.id},'drive_link',this.value)">`:(e.drive_link?`<a href="${e.drive_link}" target="_blank" style="font-size:11px;color:var(--blue)">🔗 Open</a>`:'—')}</td>
        <td>${isSA?`<input class="ds-inp" value="${(e.ref_numbers||'').replace(/"/g,'&quot;')}" onchange="updateDsField(${e.id},'ref_numbers',this.value)">`:`<span style="font-size:11px;color:var(--t2);font-family:'DM Mono',monospace">${e.ref_numbers||'—'}</span>`}</td>
        <td>${isSA?`<input class="ds-inp" value="${(e.remarks||'').replace(/"/g,'&quot;')}" onchange="updateDsField(${e.id},'remarks',this.value)">`:`<span style="font-size:12px;color:var(--t2)">${e.remarks||'—'}</span>`}</td>
        <td style="font-family:'DM Mono',monospace;font-size:12px;text-align:right">${isSA?`<input class="ds-inp amount" value="${e.amount||''}" type="text" inputmode="decimal" onchange="updateDsField(${e.id},'amount',this.value)" oninput="this.value=this.value.replace(/[^0-9.]/g,'')">`:`₹${Number(e.amount||0).toLocaleString('en-IN')}`}</td>
        <td style="white-space:nowrap;text-align:center">
          ${isSA?`<button class="ds-edit-btn" onclick="deleteDsRow(${e.id})" style="background:var(--red-bg);border-color:var(--red-bd);color:var(--red)">🗑 Delete</button>`:`<span class="ds-locked">🔒 Locked</span>`}
        </td>
      </tr>`).join('') + newEntryRow;
  }).join('');

  el.innerHTML=`
  <div class="scard">
    <div class="shead">
      <span class="stitle"><span class="stitle-accent"></span><span class="ds-month-hd" style="margin:0">${monthName}</span></span>
      ${isSA?`<button class="btn bo btn-sm" onclick="openDsSettings()">⚙ Back Days: ${backDays}</button>`:'<span style="font-size:10px;color:var(--t3)">Only today\'s entry is allowed</span>'}
    </div>
    ${filterBar}
    <div class="sbody" style="padding:0;margin-top:10px">
      <div class="ds-table-wrap">
        <table class="ds-table">
          <thead><tr>
            <th style="min-width:100px">Date</th>
            <th style="min-width:160px">Particular</th>
            <th style="min-width:80px">Supp. Doc</th>
            <th style="min-width:90px">Drive Link</th>
            <th style="min-width:120px">Bill / MF / GC No</th>
            <th style="min-width:100px">Remarks</th>
            <th style="min-width:100px;text-align:right">Amount (₹)</th>
            <th style="min-width:90px;text-align:center"></th>
          </tr></thead>
          <tbody>${rows||'<tr><td colspan="8" style="text-align:center;padding:24px;color:var(--t3)">No entries found for this period</td></tr>'}</tbody>
        </table>
      </div>
    </div>
  </div>`;
}

async function loadDsForUser(uid){
  // SA viewing another user's entries — fetch from DB
  _dsState.userId=uid;
  const viewId=parseInt(uid);
  const dsFrom=new Date(); dsFrom.setMonth(dsFrom.getMonth()-3);
  const {data}=await sb.from('day_sheet').select('*').eq('user_id',viewId).gte('entry_date',dsFrom.toISOString().slice(0,10)).order('entry_date',{ascending:false});

async function saveDsRow(date, rowIdx=0){
  const particular=document.getElementById(`ds-part-${date}-${rowIdx}`)?.value?.trim();
  if(!particular){ toast('Particular is required','er'); return; }
  const amtRaw=document.getElementById(`ds-amt-${date}-${rowIdx}`)?.value?.trim();
  const amount=amtRaw===''?0:parseFloat(amtRaw)||0;
  const payload={
    user_id:       CU.id,
    entry_date:    date,
    particular,
    supported_doc: document.getElementById(`ds-doc-${date}-${rowIdx}`)?.value||'NO',
    drive_link:    document.getElementById(`ds-url-${date}-${rowIdx}`)?.value?.trim()||'',
    ref_numbers:   document.getElementById(`ds-ref-${date}-${rowIdx}`)?.value?.trim()||'',
    remarks:       document.getElementById(`ds-rem-${date}-${rowIdx}`)?.value?.trim()||'',
    amount,
    locked:        true
  };
  const {data,error}=await sb.from('day_sheet').insert(payload).select().single();
  if(error){ toast('Failed: '+error.message,'er'); return; }
  C.daySheet.unshift(data);
  toast('Entry saved ✓');
  renderDaySheet();
}

async function updateDsField(id,field,value){
  if(CU.role!=='superadmin'){ toast('Only Super Admin can edit saved entries','er'); return; }
  const {error}=await sb.from('day_sheet').update({[field]:field==='amount'?parseFloat(value)||0:value}).eq('id',id);
  if(error){ toast('Update failed','er'); return; }
  const entry=C.daySheet.find(e=>e.id===id);
  if(entry) entry[field]=value;
}

async function deleteDsRow(id){
  if(CU.role!=='superadmin'){ toast('Only Super Admin can delete entries','er'); return; }
  if(!confirm('Delete this entry? This cannot be undone.')) return;
  const {error}=await sb.from('day_sheet').delete().eq('id',id);
  if(error){ toast('Delete failed','er'); return; }
  C.daySheet=C.daySheet.filter(e=>e.id!==id);
  toast('Entry deleted');
  renderDaySheet();
}

async function openDsSettings(){
  if(CU.role!=='superadmin'){ toast('Only Super Admin can change this','er'); return; }
  const val=prompt(`How many days back can users enter data?\n(Current: ${C.dsBackDays||3} days)`,'');
  if(val===null||val.trim()==='') return;
  const days=Math.max(0,Math.min(30,parseInt(val)));
  if(isNaN(days)){ toast('Invalid number','er'); return; }
  await sb.from('settings').upsert({key:'daysheet_back_days',value:String(days)},{onConflict:'key'});
  C.dsBackDays=days;
  toast(`Back days updated to ${days}`);
  renderDaySheet();
}

function calcScore(tasks){
  let score=0, detail={verified:0,rejected:0,overdue:0,onTime:0};
  tasks.forEach(t=>{
    if(t.status==='Verified'){
      detail.verified++;
      // Check if it was on time
      if(t.completed_at&&t.due_date&&t.completed_at.slice(0,10)<=t.due_date){ detail.onTime++; score+=10; }
      else { score+=7; } // verified but late
    }
    if(t.status==='Rejected'){ detail.rejected++; score-=5; }
    if(overdue(t)){ detail.overdue++; score-=3; }
  });
  return {score:Math.max(0,score),detail};
}

function scoreColor(s){
  if(s>=80) return 'var(--green)';
  if(s>=50) return 'var(--amber)';
  return 'var(--red)';
}

function scoreRing(score,max,color,size=110){
  const r=42, circ=2*Math.PI*r, pct=Math.min(score/Math.max(max,1),1);
  const dash=circ*pct, gap=circ-dash;
  return `<svg width="${size}" height="${size}" viewBox="0 0 100 100" style="position:absolute;top:0;left:0;transform:rotate(-90deg)">
    <circle cx="50" cy="50" r="${r}" fill="none" stroke="var(--border2)" stroke-width="8"/>
    <circle cx="50" cy="50" r="${r}" fill="none" stroke="${color}" stroke-width="8"
      stroke-dasharray="${dash} ${gap}" stroke-linecap="round"/>
  </svg>`;
}

// ══════════════════════════════════════════════════════
//  FREIGHT ENTRY — Complete Rebuild
//  Branches: Super Admin manages. Each branch has 6 fixed sub-rows:
//    BILTI FREIGHT (S/T), LORRY FREIGHT (S/T), BILL (S/T)
//  Monthly grid: date columns, per cell: DocRecDate, DataFeeder☐, DataCheck☐, FinalApproval☐, Remarks
//  Weekly grid: Mon-Sun columns, per cell: TurnOver₹, DataFeeder☐, DataCheck☐, FinalApproval☐, Remarks
//  Only TODAY editable. DataFeeder=SubAdmin, DataCheck=SubAdmin2, FinalApproval=SuperAdmin
// ══════════════════════════════════════════════════════

const FR_SUB_ROWS = [
  'BILTI FREIGHT (S)', 'LORRY FREIGHT (S)', 'BILL (S)',
  'BILTI FREIGHT (T)', 'LORRY FREIGHT (T)', 'BILL (T)'
];

const FY_MONTHS = [
  '2026-04','2026-05','2026-06','2026-07','2026-08','2026-09',
  '2026-10','2026-11','2026-12','2027-01','2027-02','2027-03'
];
const FY_MONTH_LABELS = {
  '2026-04':'Apr 26','2026-05':'May 26','2026-06':'Jun 26',
  '2026-07':'Jul 26','2026-08':'Aug 26','2026-09':'Sep 26',
  '2026-10':'Oct 26','2026-11':'Nov 26','2026-12':'Dec 26',
  '2027-01':'Jan 27','2027-02':'Feb 27','2027-03':'Mar 27'
};

let _frTab   = 'monthly'; // 'monthly' | 'weekly'
let _frMonth = '';

// Who can tick what
function canTickDataFeeder(){ return ['subadmin','admin','superadmin'].includes(CU.role); }
function canTickDataCheck(){   return ['subadmin','admin','superadmin'].includes(CU.role); }
function canTickFinalApproval(){ return CU.role==='superadmin'; }
function isFreightUser(){ return allTasks().some(t=>t.type==='Freight Entry'&&t.assigned_to_user===CU.id&&t.status==='In Progress'); }

function renderFreight(){
  const el=document.getElementById('pg-freight'); if(!el) return;
  const now=new Date();
  const isSA=['superadmin','admin'].includes(CU.role);

  // Init month
  if(!_frMonth){
    const cur=now.toISOString().slice(0,7);
    _frMonth=FY_MONTHS.includes(cur)?cur:'2026-04';
  }

  // Access check — SA always, others need freight task or subadmin role
  const hasAccess=isSA||isFreightUser()||CU.role==='subadmin';
  if(!hasAccess){
    el.innerHTML=`<div class="scard"><div class="empty"><div class="empty-ic">🚛</div><div class="empty-t">No Access</div><div class="empty-s">You are not assigned to a Freight Entry task.</div></div></div>`;
    return;
  }

  const tabBar=`<div class="fr-tab-bar">
    <div class="fr-tab ${_frTab==='monthly'?'on':''}" onclick="_frTab='monthly';renderFreight()">📅 Monthly</div>
    <div class="fr-tab ${_frTab==='weekly'?'on':''}" onclick="_frTab='weekly';renderFreight()">📆 Weekly</div>
    ${isSA?`<div class="fr-tab ${_frTab==='branches'?'on':''}" onclick="_frTab='branches';renderFreight()">🏢 Manage Branches</div>`:''}
    ${isSA?`<div class="fr-tab ${_frTab==='team'?'on':''}" onclick="_frTab='team';renderFreight()">👥 Freight Team</div>`:''}
  </div>`;

  if(_frTab==='branches'){ el.innerHTML=tabBar+renderFreightBranchMgmt(); return; }
  if(_frTab==='team')    { el.innerHTML=tabBar+renderFreightTeamMgmt();   return; }
  if(_frTab==='monthly') { el.innerHTML=tabBar+renderFreightMonthly(now,isSA); return; }
  if(_frTab==='weekly')  { el.innerHTML=tabBar+renderFreightWeekly(now,isSA); return; }
}

// ── MONTHLY GRID ──
function renderFreightMonthly(now, isSA){
  const [yr,mo0]=_frMonth.split('-').map(Number);
  const mo=mo0-1;
  const moStr=String(mo+1).padStart(2,'0');
  const daysInMonth=new Date(yr,mo+1,0).getDate();
  const todayStr=now.toISOString().slice(0,10);
  const isCurrentMo=_frMonth===now.toISOString().slice(0,7);
  const monthName=new Date(yr,mo,1).toLocaleDateString('en-IN',{month:'long',year:'numeric'});

  // Branches
  const branches=(C.freightBranches||[]);
  if(!branches.length && !isSA){
    return `<div class="scard"><div class="empty"><div class="empty-ic">🏢</div><div class="empty-t">No Branches Configured</div><div class="empty-s">Ask Super Admin to add branches.</div></div></div>`;
  }

  // Index existing entries: key = branchId_subRow_date
  const entryMap={};
  (C.freightData||[]).forEach(e=>{
    if(e.grid_type==='monthly') entryMap[`${e.branch_id}_${e.sub_row}_${e.entry_date}`]=e;
  });

  // Build date columns
  const dates=[];
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${yr}-${moStr}-${String(d).padStart(2,'0')}`;
    dates.push(ds);
  }

  // Stats
  const todayIdx=dates.indexOf(todayStr);
  const pastDates=isCurrentMo?dates.slice(0,todayIdx):dates;
  let totalCells=pastDates.length*branches.length*FR_SUB_ROWS.length;
  let filledCells=Object.keys(entryMap).filter(k=>{
    const date=k.split('_')[2]; return pastDates.includes(date);
  }).length;

  // Month selector
  const moBar=`<div class="fr-mo-bar">
    ${FY_MONTHS.map(ym=>`<button class="fr-mo-btn ${_frMonth===ym?'on':''}" onclick="_frMonth='${ym}';renderFreight()">${FY_MONTH_LABELS[ym]}</button>`).join('')}
  </div>`;

  // Build table header
  const dateHdrs=dates.map(ds=>{
    const isToday=ds===todayStr;
    const d=new Date(ds).getDate();
    const dayName=new Date(ds).toLocaleDateString('en-IN',{weekday:'short'});
    const hasSomeEntry=branches.some(br=>FR_SUB_ROWS.some(sr=>entryMap[`${br.id}_${sr}_${ds}`]));
    let cls='date-col';
    if(isToday) cls+=' today';
    else if(hasSomeEntry) cls+=' filled';
    else if(new Date(ds)<now && ds!==todayStr && isCurrentMo && new Date(ds).toISOString().slice(0,10)<todayStr) cls+=' missing';
    return `<th class="${cls}">${String(d).padStart(2,'0')}-${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][mo]}<br><span style="font-weight:400;opacity:.8">${dayName}</span></th>`;
  }).join('');

  // Build rows
  let rowsHtml='';
  branches.forEach(br=>{
    // Branch group header row
    rowsHtml+=`<tr><td class="branch-group" colspan="${dates.length+1}">${br.name}</td></tr>`;
    FR_SUB_ROWS.forEach(sr=>{
      const subLabel=sr;
      rowsHtml+=`<tr><td class="branch-name">&nbsp;&nbsp;&nbsp;${subLabel}</td>`;
      dates.map(ds=>{
        const isToday=ds===todayStr;
        const isPast=ds<todayStr;
        const isFuture=ds>todayStr;
        const key=`${br.id}_${sr}_${ds}`;
        const entry=entryMap[key];
        let cellCls='';
        if(isToday) cellCls='today-cell';
        else if(entry) cellCls='filled-cell';
        else if(isPast) cellCls='missing-cell';

        if(entry){
          // Show filled data
          rowsHtml+=`<td class="${cellCls}">
            <div class="fr-filled-cell">
              <div class="fr-filled-row"><span class="fr-filled-lbl">DRD</span><span style="font-size:10px;color:var(--t)">${entry.doc_rec_date||'—'}</span></div>
              <div class="fr-filled-row"><span class="fr-filled-lbl">DF</span><span class="${entry.data_feeder?'fr-chk-done':'fr-chk-no'}">${entry.data_feeder?'✓':'✗'}</span></div>
              <div class="fr-filled-row"><span class="fr-filled-lbl">DC</span><span class="${entry.data_check?'fr-chk-done':'fr-chk-no'}">${entry.data_check?'✓':'✗'}</span></div>
              <div class="fr-filled-row"><span class="fr-filled-lbl">FA</span><span class="${entry.final_approval?'fr-chk-done':'fr-chk-no'}">${entry.final_approval?'✓':'✗'}</span></div>
              ${entry.remarks?`<div class="fr-filled-row" style="margin-top:1px"><span style="font-size:9px;color:var(--t3);font-style:italic">${entry.remarks}</span></div>`:''}
            </div>
          </td>`;
        } else if(isToday){
          const eid=`m_${br.id}_${sr.replace(/[^a-z0-9]/gi,'_')}_${ds}`;
          rowsHtml+=`<td class="${cellCls}">
            <div class="fr-cell-wrap">
              <div class="fr-cell-row"><span class="fr-cell-lbl">DRD</span><input class="fr-cinp" id="${eid}_drd" placeholder="date rec…"></div>
              <div class="fr-cell-row"><span class="fr-cell-lbl">DF</span><input type="checkbox" class="fr-cb done" id="${eid}_df" ${canTickDataFeeder()?'':'disabled'}></div>
              <div class="fr-cell-row"><span class="fr-cell-lbl">DC</span><input type="checkbox" class="fr-cb pending" id="${eid}_dc" ${canTickDataCheck()?'':'disabled'}></div>
              <div class="fr-cell-row"><span class="fr-cell-lbl">FA</span><input type="checkbox" class="fr-cb done" id="${eid}_fa" ${canTickFinalApproval()?'':'disabled'}></div>
              <div class="fr-cell-row"><span class="fr-cell-lbl">Rem</span><input class="fr-cinp" id="${eid}_rem" placeholder="remark…"></div>
              <button class="fr-save-btn" style="margin-top:4px" onclick="saveFreightCell('monthly','${br.id}','${sr}','${ds}','${eid}')">Save</button>
            </div>
          </td>`;
        } else if(isFuture){
          rowsHtml+=`<td style="background:var(--bg3);text-align:center"><span style="font-size:9px;color:var(--t4)">—</span></td>`;
        } else {
          rowsHtml+=`<td class="${cellCls}" style="text-align:center"><span class="fr-miss">❌</span></td>`;
        }
      });
      rowsHtml+=`</tr>`;
    });
  });

  if(!branches.length){
    rowsHtml=`<tr><td colspan="${dates.length+1}" style="text-align:center;padding:20px;color:var(--t3)">No branches configured. ${isSA?'Go to Manage Branches tab.':''}</td></tr>`;
  }

  return `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
    <span class="fr-hd">📅 Monthly — ${monthName}</span>
    <div class="fr-stat-bar" style="margin:0">
      <div class="fr-stat"><div class="fr-stat-v" style="color:var(--green)">${filledCells}</div><div class="fr-stat-l">Filled</div></div>
      <div class="fr-stat"><div class="fr-stat-v" style="color:var(--red)">${Math.max(0,totalCells-filledCells)}</div><div class="fr-stat-l">Missing</div></div>
    </div>
  </div>
  ${moBar}
  <div class="scard">
    <div class="sbody" style="padding:0">
      <div class="fr-wrap">
        <table class="fr-grid">
          <thead><tr><th class="branch-col">Branch / Sub-Row</th>${dateHdrs}</tr></thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      </div>
    </div>
  </div>`;
}

// ── WEEKLY GRID ──
function renderFreightWeekly(now, isSA){
  // Get Mon-Sun of current week
  const day=now.getDay(); // 0=Sun
  const monday=new Date(now); monday.setDate(now.getDate()-(day===0?6:day-1));
  const weekDates=[];
  for(let i=0;i<7;i++){
    const d=new Date(monday); d.setDate(monday.getDate()+i);
    weekDates.push(d.toISOString().slice(0,10));
  }
  const todayStr=now.toISOString().slice(0,10);
  const dayNames=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const branches=(C.freightBranches||[]);

  const entryMap={};
  (C.freightData||[]).forEach(e=>{
    if(e.grid_type==='weekly') entryMap[`${e.branch_id}_${e.sub_row}_${e.entry_date}`]=e;
  });

  const weekLabel=`${new Date(weekDates[0]).toLocaleDateString('en-IN',{day:'2-digit',month:'short'})} – ${new Date(weekDates[6]).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}`;

  const dateHdrs=weekDates.map((ds,i)=>{
    const isToday=ds===todayStr;
    const d=new Date(ds).getDate();
    const mo=new Date(ds).toLocaleDateString('en-IN',{month:'short'});
    const hasSome=branches.some(br=>FR_SUB_ROWS.some(sr=>entryMap[`${br.id}_${sr}_${ds}`]));
    let cls='date-col';
    if(isToday) cls+=' today';
    else if(hasSome) cls+=' filled';
    return `<th class="${cls}">${String(d).padStart(2,'0')}-${mo}<br><span style="font-weight:400;opacity:.8">${dayNames[i]}</span></th>`;
  }).join('');

  let rowsHtml='';
  branches.forEach(br=>{
    rowsHtml+=`<tr><td class="branch-group" colspan="8">${br.name}</td></tr>`;
    FR_SUB_ROWS.forEach(sr=>{
      rowsHtml+=`<tr><td class="branch-name">&nbsp;&nbsp;&nbsp;${sr}</td>`;
      weekDates.forEach(ds=>{
        const isToday=ds===todayStr;
        const isPast=ds<todayStr;
        const isFuture=ds>todayStr;
        const key=`${br.id}_${sr}_${ds}`;
        const entry=entryMap[key];
        let cellCls='';
        if(isToday) cellCls='today-cell';
        else if(entry) cellCls='filled-cell';

        if(entry){
          rowsHtml+=`<td class="${cellCls}">
            <div class="fr-filled-cell">
              <div class="fr-filled-row"><span class="fr-filled-lbl">TO</span><span style="font-size:10px;color:var(--t);font-family:'DM Mono',monospace">₹${Number(entry.turnover||0).toLocaleString('en-IN')}</span></div>
              <div class="fr-filled-row"><span class="fr-filled-lbl">DF</span><span class="${entry.data_feeder?'fr-chk-done':'fr-chk-no'}">${entry.data_feeder?'✓':'✗'}</span></div>
              <div class="fr-filled-row"><span class="fr-filled-lbl">DC</span><span class="${entry.data_check?'fr-chk-done':'fr-chk-no'}">${entry.data_check?'✓':'✗'}</span></div>
              <div class="fr-filled-row"><span class="fr-filled-lbl">FA</span><span class="${entry.final_approval?'fr-chk-done':'fr-chk-no'}">${entry.final_approval?'✓':'✗'}</span></div>
              ${entry.remarks?`<div class="fr-filled-row"><span style="font-size:9px;color:var(--t3);font-style:italic">${entry.remarks}</span></div>`:''}
            </div>
          </td>`;
        } else if(isToday){
          const eid=`w_${br.id}_${sr.replace(/[^a-z0-9]/gi,'_')}_${ds}`;
          rowsHtml+=`<td class="${cellCls}">
            <div class="fr-cell-wrap">
              <div class="fr-cell-row"><span class="fr-cell-lbl">TO</span><input class="fr-cinp amount" id="${eid}_to" placeholder="0" type="text" inputmode="decimal" oninput="this.value=this.value.replace(/[^0-9.]/g,'')"></div>
              <div class="fr-cell-row"><span class="fr-cell-lbl">DF</span><input type="checkbox" class="fr-cb done" id="${eid}_df" ${canTickDataFeeder()?'':'disabled'}></div>
              <div class="fr-cell-row"><span class="fr-cell-lbl">DC</span><input type="checkbox" class="fr-cb pending" id="${eid}_dc" ${canTickDataCheck()?'':'disabled'}></div>
              <div class="fr-cell-row"><span class="fr-cell-lbl">FA</span><input type="checkbox" class="fr-cb done" id="${eid}_fa" ${canTickFinalApproval()?'':'disabled'}></div>
              <div class="fr-cell-row"><span class="fr-cell-lbl">Rem</span><input class="fr-cinp" id="${eid}_rem" placeholder="remark…"></div>
              <button class="fr-save-btn" style="margin-top:4px" onclick="saveFreightCell('weekly','${br.id}','${sr}','${ds}','${eid}')">Save</button>
            </div>
          </td>`;
        } else if(isFuture){
          rowsHtml+=`<td style="background:var(--bg3);text-align:center"><span style="font-size:9px;color:var(--t4)">—</span></td>`;
        } else {
          rowsHtml+=`<td style="text-align:center"><span class="fr-miss">❌</span></td>`;
        }
      });
      rowsHtml+=`</tr>`;
    });
  });

  if(!branches.length){
    rowsHtml=`<tr><td colspan="8" style="text-align:center;padding:20px;color:var(--t3)">No branches configured.</td></tr>`;
  }

  return `
  <div style="display:flex;align-items:center;margin-bottom:14px">
    <span class="fr-hd">📆 Weekly — ${weekLabel}</span>
  </div>
  <div class="scard">
    <div class="sbody" style="padding:0">
      <div class="fr-wrap">
        <table class="fr-grid">
          <thead><tr><th class="branch-col">Branch / Sub-Row</th>${dateHdrs}</tr></thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      </div>
    </div>
  </div>`;
}

// ── SAVE CELL ──
async function saveFreightCell(gridType, branchId, subRow, dateStr, eid){
  const btn=document.querySelector(`button[onclick*="${eid}"]`);
  if(btn){btn.disabled=true;btn.textContent='...';}

  let payload={
    grid_type:      gridType,
    branch_id:      parseInt(branchId),
    sub_row:        subRow,
    entry_date:     dateStr,
    data_feeder:    document.getElementById(eid+'_df')?.checked||false,
    data_check:     document.getElementById(eid+'_dc')?.checked||false,
    final_approval: document.getElementById(eid+'_fa')?.checked||false,
    remarks:        document.getElementById(eid+'_rem')?.value?.trim()||'',
    entered_by:     CU.id
  };

  if(gridType==='monthly'){
    payload.doc_rec_date=document.getElementById(eid+'_drd')?.value?.trim()||'';
  } else {
    const toVal=document.getElementById(eid+'_to')?.value?.trim()||'0';
    payload.turnover=parseFloat(toVal)||0;
  }

  const {data,error}=await sb.from('freight_data').insert(payload).select().single();
  if(btn){btn.disabled=false;btn.textContent='Save';}
  if(error){toast('Failed: '+error.message,'er');return;}
  if(!C.freightData) C.freightData=[];
  C.freightData.push(data);
  toast('Saved ✓');
  renderFreight();
}

// ── BRANCH MANAGEMENT ──
function renderFreightBranchMgmt(){
  const branches=C.freightBranches||[];
  const rows=branches.map(br=>`
    <div class="fr-branch-item">
      <span style="flex:1;font-weight:600">🏢 ${br.name}</span>
      <span style="font-size:10px;color:var(--t3)">${FR_SUB_ROWS.length} sub-rows auto</span>
      <button class="btn bd btn-sm" onclick="deleteFreightBranch(${br.id},'${br.name}')">Remove</button>
    </div>`).join('');

  return `
  <div class="scard">
    <div class="shead"><span class="stitle"><span class="stitle-accent"></span>Freight Branches</span></div>
    <div class="sbody">
      <div style="display:flex;gap:8px;margin-bottom:14px">
        <input type="text" id="new-fr-branch" placeholder="Branch name (e.g. DELHI)" style="flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:8px 12px;font-size:12px;color:var(--t);outline:none">
        <button class="btn bg-" onclick="addFreightBranch()">+ Add Branch</button>
      </div>
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);overflow:hidden">
        ${rows||'<div style="padding:20px;text-align:center;color:var(--t3);font-size:12px">No branches yet. Add one above.</div>'}
      </div>
      <div style="margin-top:12px;padding:10px 12px;background:var(--gold-bg);border:1px solid var(--gold-bd);border-radius:var(--r);font-size:11px;color:var(--t2)">
        ℹ️ Each branch automatically gets 6 sub-rows: BILTI FREIGHT (S/T), LORRY FREIGHT (S/T), BILL (S/T)
      </div>
    </div>
  </div>`;
}

async function addFreightBranch(){
  const name=document.getElementById('new-fr-branch')?.value?.trim().toUpperCase();
  if(!name){toast('Enter branch name','er');return;}
  if((C.freightBranches||[]).find(b=>b.name===name)){toast('Branch already exists','wa');return;}
  const {data,error}=await sb.from('freight_branches').insert({name,created_by:CU.id}).select().single();
  if(error){toast('Failed: '+error.message,'er');return;}
  if(!C.freightBranches) C.freightBranches=[];
  C.freightBranches.push(data);
  toast(`${name} added ✓`);
  renderFreight();
}

async function deleteFreightBranch(id,name){
  if(!confirm(`Remove branch "${name}"? All freight data for this branch will also be deleted.`)) return;
  await sb.from('freight_branches').delete().eq('id',id);
  C.freightBranches=(C.freightBranches||[]).filter(b=>b.id!==id);
  C.freightData=(C.freightData||[]).filter(e=>e.branch_id!==id);
  toast(`${name} removed`);
  renderFreight();
}

// ── FREIGHT TEAM MANAGEMENT ──
function renderFreightTeamMgmt(){
  const team=(C.freightTeam||[]);
  const nonTeam=allUsers().filter(u=>u.role!=='superadmin'&&!team.find(t=>t.user_id===u.id)&&u.active);
  const rows=team.map(t=>{
    const u=getUser(t.user_id);
    return `<div class="fr-branch-item">
      <div style="width:28px;height:28px;border-radius:50%;background:${u?.color||'#666'}22;color:${u?.color||'#666'};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">${u?.avatar||'?'}</div>
      <span style="flex:1;font-weight:600">${u?.name||'Unknown'}</span>
      <span class="bdg b-gy" style="font-size:9px">${t.freight_role||u?.role}</span>
      <button class="btn bd btn-sm" onclick="removeFreightTeam(${t.id})">Remove</button>
    </div>`;
  }).join('');

  return `
  <div class="scard">
    <div class="shead"><span class="stitle"><span class="stitle-accent"></span>Freight Team Members</span></div>
    <div class="sbody">
      <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
        <select id="new-fr-user" style="flex:1;min-width:180px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:7px 10px;font-size:12px;color:var(--t);outline:none">
          <option value="">— Select User —</option>
          ${nonTeam.map(u=>`<option value="${u.id}">${u.name} (${RL[u.role]})</option>`).join('')}
        </select>
        <select id="new-fr-role" style="background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:7px 10px;font-size:12px;color:var(--t);outline:none">
          <option value="Data Feeder">Data Feeder</option>
          <option value="Data Check">Data Check</option>
        </select>
        <button class="btn bg-" onclick="addFreightTeam()">+ Add Member</button>
      </div>
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);overflow:hidden">
        ${rows||'<div style="padding:20px;text-align:center;color:var(--t3);font-size:12px">No team members yet.</div>'}
      </div>
    </div>
  </div>`;
}

async function addFreightTeam(){
  const uid=parseInt(document.getElementById('new-fr-user')?.value);
  const role=document.getElementById('new-fr-role')?.value;
  if(!uid){toast('Select a user','er');return;}
  const {data,error}=await sb.from('freight_team').insert({user_id:uid,freight_role:role,added_by:CU.id}).select().single();
  if(error){toast('Failed: '+error.message,'er');return;}
  if(!C.freightTeam) C.freightTeam=[];
  C.freightTeam.push(data);
  toast('Team member added ✓');
  renderFreight();
}

async function removeFreightTeam(id){
  await sb.from('freight_team').delete().eq('id',id);
  C.freightTeam=(C.freightTeam||[]).filter(t=>t.id!==id);
  toast('Removed');
  renderFreight();
}
