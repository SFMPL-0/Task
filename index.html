<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Pro | Enterprise Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide-static/dist/lucide.min.js"></script>
    <style>
        :root {
            --bg: #0f172a; --panel: #1e293b; --border: #334155;
            --primary: #3b82f6; --secondary: #8b5cf6; --text: #f8fafc;
            --text-dim: #94a3b8; --success: #10b981; --danger: #ef4444;
            --radius: 12px; --shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
        }
        [data-theme="light"] {
            --bg: #f8fafc; --panel: #ffffff; --border: #e2e8f0;
            --text: #0f172a; --text-dim: #64748b; --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

        /* Layout */
        #app { display: grid; grid-template-columns: 260px 1fr; height: 100vh; }
        
        /* Sidebar */
        aside { 
            background: var(--panel); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; padding: 20px;
        }
        .logo { font-size: 1.5rem; font-weight: 800; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 40px; }
        .nav-link { 
            display: flex; align-items: center; gap: 12px; padding: 12px; 
            border-radius: var(--radius); cursor: pointer; color: var(--text-dim);
            transition: 0.2s; margin-bottom: 4px; text-decoration: none;
        }
        .nav-link:hover, .nav-link.active { background: rgba(59, 130, 246, 0.1); color: var(--primary); }

        /* Main Content */
        main { display: flex; flex-direction: column; overflow: hidden; }
        header { 
            height: 70px; border-bottom: 1px solid var(--border); 
            display: flex; align-items: center; justify-content: space-between; padding: 0 30px;
            background: var(--panel);
        }

        .view-container { flex: 1; overflow-y: auto; padding: 30px; }

        /* Stats Blocks */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { 
            background: var(--panel); border: 1px solid var(--border); padding: 24px; 
            border-radius: var(--radius); box-shadow: var(--shadow);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .stat-card:hover { transform: translateY(-5px); border-color: var(--primary); }

        /* Task Cards (Fusion Style) */
        .task-card {
            background: var(--panel); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 16px; margin-bottom: 16px;
            display: flex; align-items: center; gap: 20px; cursor: pointer;
            transition: all 0.2s;
        }
        .task-card:hover { border-color: var(--secondary); box-shadow: 0 0 15px rgba(139, 92, 246, 0.1); }
        .priority-indicator { width: 4px; height: 40px; border-radius: 2px; }
        .p-High { background: var(--danger); }
        .p-Medium { background: var(--primary); }
        .p-Low { background: var(--success); }

        /* Kanban Board */
        .kanban-board { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 20px; height: 100%; }
        .kanban-col { min-width: 300px; background: rgba(0,0,0,0.1); border-radius: var(--radius); padding: 15px; }
        .kanban-col h3 { margin-bottom: 15px; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); }

        /* Modals */
        .modal-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal { 
            background: var(--panel); width: 100%; max-width: 600px; padding: 30px; 
            border-radius: 20px; border: 1px solid var(--border); box-shadow: var(--shadow);
        }

        /* Buttons */
        .btn { 
            padding: 10px 20px; border-radius: 8px; border: none; font-weight: 600; 
            cursor: pointer; transition: 0.2s; font-family: inherit;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { opacity: 0.9; transform: scale(1.02); }

        /* Auth Screen */
        #auth-screen { 
            position: fixed; inset: 0; background: var(--bg); z-index: 2000; 
            display: flex; align-items: center; justify-content: center;
        }
        .auth-card { background: var(--panel); padding: 40px; border-radius: 20px; width: 400px; border: 1px solid var(--border); }

        /* Utils */
        .hidden { display: none !important; }
        input, select, textarea { 
            width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); margin-top: 8px; margin-bottom: 16px;
        }
    </style>
</head>
<body>

    <!-- Authentication Screen -->
    <div id="auth-screen">
        <div class="auth-card">
            <h1 class="logo">TaskFlow Pro</h1>
            <p style="margin-bottom: 20px; color: var(--text-dim);">Enterprise Grade Task Management</p>
            <form id="auth-form">
                <label>Email</label>
                <input type="email" id="auth-email" required>
                <label>Password</label>
                <input type="password" id="auth-password" required>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Access Workspace</button>
            </form>
            <p id="auth-msg" style="margin-top: 15px; font-size: 0.85rem; color: var(--danger);"></p>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="hidden">
        <aside>
            <div class="logo">TaskFlow</div>
            <nav>
                <div class="nav-link active" onclick="app.switchView('dashboard')"><i data-lucide="layout-dashboard"></i> Dashboard</div>
                <div class="nav-link" onclick="app.switchView('list')"><i data-lucide="list"></i> List View</div>
                <div class="nav-link" onclick="app.switchView('kanban')"><i data-lucide="trello"></i> Kanban</div>
                <div class="nav-link" onclick="app.switchView('calendar')"><i data-lucide="calendar"></i> Calendar</div>
                <div class="nav-link" onclick="app.switchView('analytics')"><i data-lucide="bar-chart-3"></i> Analytics</div>
            </nav>
            <div style="margin-top: auto;">
                <div class="nav-link" onclick="app.logout()"><i data-lucide="log-out"></i> Logout</div>
            </div>
        </aside>

        <main>
            <header>
                <h2 id="view-title">Dashboard</h2>
                <div style="display: flex; gap: 15px; align-items: center;">
                    <button class="btn btn-primary" onclick="app.openModal('task-modal')">+ New Task</button>
                    <div id="user-profile" style="display: flex; align-items: center; gap: 10px;">
                        <span id="user-name">Loading...</span>
                        <div id="user-avatar" style="width: 35px; height: 35px; border-radius: 50%; background: var(--secondary);"></div>
                    </div>
                </div>
            </header>

            <div class="view-container" id="view-content">
                <!-- Dashboard View (Default) -->
                <div id="view-dashboard">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <p style="color: var(--text-dim);">Active Tasks</p>
                            <h2 id="stat-active">0</h2>
                        </div>
                        <div class="stat-card">
                            <p style="color: var(--text-dim);">Efficiency</p>
                            <h2 id="stat-efficiency">0%</h2>
                        </div>
                        <div class="stat-card">
                            <p style="color: var(--text-dim);">Overdue</p>
                            <h2 id="stat-overdue" style="color: var(--danger);">0</h2>
                        </div>
                        <div class="stat-card">
                            <p style="color: var(--text-dim);">Completed</p>
                            <h2 id="stat-completed">0</h2>
                        </div>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 30px;">
                        <div class="stat-card">
                            <h3>Productivity Trend</h3>
                            <canvas id="productivityChart" height="200"></canvas>
                        </div>
                        <div class="stat-card">
                            <h3>Recent Activity</h3>
                            <div id="activity-feed" style="margin-top: 15px;"></div>
                        </div>
                    </div>
                </div>

                <!-- List View -->
                <div id="view-list" class="hidden">
                    <div id="task-list-container"></div>
                </div>

                <!-- Kanban View -->
                <div id="view-kanban" class="hidden">
                    <div class="kanban-board" id="kanban-board"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Task Creation Modal -->
    <div class="modal-overlay" id="task-modal">
        <div class="modal">
            <h3>Create Global Task Template</h3>
            <form id="task-form">
                <input type="text" id="task-title" placeholder="Task Name" required>
                <textarea id="task-desc" placeholder="Details..."></textarea>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <select id="task-priority">
                        <option value="Low">Low Priority</option>
                        <option value="Medium" selected>Medium Priority</option>
                        <option value="High">High Priority</option>
                    </select>
                    <select id="task-type" onchange="app.toggleRecurringFields()">
                        <option value="One-off">One-off</option>
                        <option value="Recurring">Recurring Rule</option>
                    </select>
                </div>
                
                <div id="recurring-fields" class="hidden">
                    <label>Frequency</label>
                    <select id="rec-freq">
                        <option value="daily">Daily</option>
                        <option value="weekly">Weekly</option>
                        <option value="monthly">Monthly</option>
                    </select>
                </div>

                <div style="margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px;">
                    <button type="button" class="btn" onclick="app.closeModal('task-modal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create Task</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Production Configuration
const SUPABASE_URL  = 'https://caorodyzkilbxepnyfkw.supabase.co';   // ← replace
const SUPABASE_KEY  = 'sb_publishable_LisCKd8P3BpSTs8IG2MibA_po54Ms-u';                   // ← replace
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        class TaskFlow {
            constructor() {
                this.user = null;
                this.tasks = [];
                this.instances = [];
                this.init();
            }

            async init() {
                this.bindEvents();
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session) this.setupApp(session.user);
                lucide.createIcons();
            }

            bindEvents() {
                document.getElementById('auth-form').onsubmit = (e) => this.handleAuth(e);
                document.getElementById('task-form').onsubmit = (e) => this.handleTaskCreation(e);
            }

            async handleAuth(e) {
                e.preventDefault();
                const email = document.getElementById('auth-email').value;
                const password = document.getElementById('auth-password').value;
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

                if (error) {
                    document.getElementById('auth-msg').innerText = error.message;
                } else {
                    this.setupApp(data.user);
                }
            }

            async setupApp(user) {
                this.user = user;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                document.getElementById('user-name').innerText = user.email.split('@')[0];
                
                await this.loadData();
                this.renderDashboard();
                this.setupRealtime();
            }

            async loadData() {
                // Fetch Task Instances (The actual work)
                const { data: instances } = await supabaseClient
                    .from('task_instances')
                    .select('*, task:tasks(*)');
                this.instances = instances || [];
            }

            setupRealtime() {
                supabaseClient
                    .channel('schema-db-changes')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'task_instances' }, 
                        payload => this.handleRealtimeUpdate(payload))
                    .subscribe();
            }

            handleRealtimeUpdate(payload) {
                // Production-grade notification and sync logic
                this.loadData().then(() => {
                    this.renderDashboard();
                    this.notify('System Update', 'Task database synchronized in real-time.');
                });
            }

            switchView(viewId) {
                const views = ['dashboard', 'list', 'kanban', 'analytics'];
                views.forEach(v => {
                    const el = document.getElementById(`view-${v}`);
                    if (el) el.classList.add('hidden');
                });
                document.getElementById(`view-${viewId}`).classList.remove('hidden');
                document.getElementById('view-title').innerText = viewId.charAt(0).toUpperCase() + viewId.slice(1);
                
                if (viewId === 'list') this.renderList();
                if (viewId === 'kanban') this.renderKanban();
            }

            renderDashboard() {
                const completed = this.instances.filter(i => i.status === 'Verified').length;
                const total = this.instances.length;
                
                document.getElementById('stat-active').innerText = this.instances.filter(i => i.status !== 'Verified').length;
                document.getElementById('stat-completed').innerText = completed;
                document.getElementById('stat-efficiency').innerText = total > 0 ? Math.round((completed / total) * 100) + '%' : '0%';
                
                this.initCharts();
            }

            renderList() {
                const container = document.getElementById('task-list-container');
                container.innerHTML = this.instances.map(inst => `
                    <div class="task-card" onclick="app.viewTaskDetail('${inst.id}')">
                        <div class="priority-indicator p-${inst.task.priority}"></div>
                        <div style="flex: 1">
                            <h4 style="margin-bottom: 4px;">${inst.task.title}</h4>
                            <p style="font-size: 0.85rem; color: var(--text-dim);">${inst.task.description || 'No description'}</p>
                        </div>
                        <div style="text-align: right">
                            <span class="btn" style="background: rgba(255,255,255,0.05); font-size: 0.75rem;">${inst.status}</span>
                            <p style="font-size: 0.7rem; color: var(--text-dim); margin-top: 5px;">Due: ${new Date(inst.due_date).toLocaleDateString()}</p>
                        </div>
                    </div>
                `).join('');
            }

            renderKanban() {
                const statuses = ['Created', 'In Progress', 'Completed', 'Verified'];
                const board = document.getElementById('kanban-board');
                board.innerHTML = statuses.map(status => `
                    <div class="kanban-col">
                        <h3>${status}</h3>
                        <div class="kanban-tasks" id="col-${status}">
                            ${this.instances.filter(i => i.status === status).map(i => `
                                <div class="task-card" style="flex-direction: column; align-items: flex-start; gap: 10px;">
                                    <p style="font-weight: 600; font-size: 0.9rem;">${i.task.title}</p>
                                    <div style="display: flex; justify-content: space-between; width: 100%; font-size: 0.75rem; color: var(--text-dim);">
                                        <span>${i.task.priority}</span>
                                        <span>${Math.round(i.progress)}%</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `).join('');
            }

            initCharts() {
                const ctx = document.getElementById('productivityChart').getContext('2d');
                if (window.myChart) window.myChart.destroy();
                window.myChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                        datasets: [{
                            label: 'Tasks Completed',
                            data: [12, 19, 3, 5, 2, 3, 7],
                            borderColor: '#3b82f6',
                            tension: 0.4,
                            fill: true,
                            backgroundColor: 'rgba(59, 130, 246, 0.1)'
                        }]
                    },
                    options: { 
                        plugins: { legend: { display: false } },
                        scales: { y: { beginAtZero: true, grid: { color: '#334155' } }, x: { grid: { display: false } } }
                    }
                });
            }

            async handleTaskCreation(e) {
                e.preventDefault();
                const title = document.getElementById('task-title').value;
                const desc = document.getElementById('task-desc').value;
                const priority = document.getElementById('task-priority').value;
                
                // 1. Create Task Template
                const { data: task, error } = await supabaseClient
                    .from('tasks')
                    .insert([{ title, description: desc, priority, created_by: this.user.id }])
                    .select()
                    .single();

                if (!error) {
                    // 2. Immediate Instance Generation (Production logic for One-off)
                    await supabaseClient.from('task_instances').insert([{
                        task_id: task.id,
                        due_date: new Date(Date.now() + 86400000).toISOString(),
                        status: 'Created'
                    }]);
                    
                    this.closeModal('task-modal');
                    this.loadData().then(() => this.renderDashboard());
                    this.notify('Success', 'Global task template and instance generated.');
                }
            }

            openModal(id) { document.getElementById(id).style.display = 'flex'; }
            closeModal(id) { document.getElementById(id).style.display = 'none'; }
            
            toggleRecurringFields() {
                const isRec = document.getElementById('task-type').value === 'Recurring';
                document.getElementById('recurring-fields').classList.toggle('hidden', !isRec);
            }

            notify(title, msg) {
                // In production, this would trigger a custom Toast component
                console.log(`[Notification] ${title}: ${msg}`);
            }

            async logout() {
                await supabaseClient.auth.signOut();
                location.reload();
            }
        }

        const app = new TaskFlow();
    </script>
</body>
</html>
