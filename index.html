<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   RESET & ROOT VARIABLES
══════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box}

:root,[data-theme="dark"]{
  --bg:       #080b12;
  --bg2:      #0d1117;
  --bg3:      #111827;
  --bg4:      #161d2b;
  --bg5:      #1a2235;
  --border:   #1e2d42;
  --border2:  #263548;
  --border3:  #2e4060;

  --t:        #e8edf5;
  --t2:       #8a98b8;
  --t3:       #4a5875;
  --t4:       #2e3a52;

  /* Accent palette — deep navy + warm gold + cool teal */
  --gold:     #c9a84c;
  --gold2:    #e0c068;
  --gold-bg:  rgba(201,168,76,.08);
  --gold-bd:  rgba(201,168,76,.18);

  --blue:     #3b7dd8;
  --blue2:    #2563c0;
  --blue-bg:  rgba(59,125,216,.1);
  --blue-bd:  rgba(59,125,216,.2);

  --teal:     #2aa8a0;
  --teal-bg:  rgba(42,168,160,.1);
  --teal-bd:  rgba(42,168,160,.2);

  --green:    #22c98e;
  --green-bg: rgba(34,201,142,.08);
  --green-bd: rgba(34,201,142,.18);

  --red:      #e05252;
  --red2:     #c43a3a;
  --red-bg:   rgba(224,82,82,.08);
  --red-bd:   rgba(224,82,82,.18);

  --amber:    #e8943a;
  --amber-bg: rgba(232,148,58,.08);
  --amber-bd: rgba(232,148,58,.18);

  --purple:   #9b72db;
  --purple-bg:rgba(155,114,219,.08);
  --purple-bd:rgba(155,114,219,.18);

  --shadow:   0 4px 32px rgba(0,0,0,.55);
  --shadow2:  0 2px 12px rgba(0,0,0,.35);
  --r:        9px;
  --r2:       12px;
  --r3:       16px;
}

[data-theme="light"]{
  --bg:       #f5f0e8;
  --bg2:      #faf7f2;
  --bg3:      #f0ebe0;
  --bg4:      #e8e1d5;
  --bg5:      #dfd7c8;
  --border:   #d8cfc0;
  --border2:  #c9bfae;
  --border3:  #b8ac9a;

  --t:        #1a150c;
  --t2:       #5a4f3f;
  --t3:       #9a8e7a;
  --t4:       #c5baa8;

  --gold:     #8b6914;
  --gold2:    #a07c20;
  --gold-bg:  rgba(139,105,20,.07);
  --gold-bd:  rgba(139,105,20,.18);

  --blue:     #1d5fb8;
  --blue2:    #1550a0;
  --blue-bg:  rgba(29,95,184,.07);
  --blue-bd:  rgba(29,95,184,.18);

  --teal:     #186e6a;
  --teal-bg:  rgba(24,110,106,.07);
  --teal-bd:  rgba(24,110,106,.18);

  --green:    #14895e;
  --green-bg: rgba(20,137,94,.07);
  --green-bd: rgba(20,137,94,.18);

  --red:      #b83030;
  --red2:     #9e2828;
  --red-bg:   rgba(184,48,48,.07);
  --red-bd:   rgba(184,48,48,.18);

  --amber:    #a85e10;
  --amber-bg: rgba(168,94,16,.07);
  --amber-bd: rgba(168,94,16,.18);

  --purple:   #6b42b8;
  --purple-bg:rgba(107,66,184,.07);
  --purple-bd:rgba(107,66,184,.18);

  --shadow:   0 4px 24px rgba(0,0,0,.1);
  --shadow2:  0 2px 8px rgba(0,0,0,.07);
}

/* ══════════════════════════════════════════
   BASE
══════════════════════════════════════════ */
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t);font-size:13px;line-height:1.5}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border3);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--t3)}

/* ══════════════════════════════════════════
   TYPOGRAPHY ACCENTS
══════════════════════════════════════════ */
.display{font-family:'Playfair Display',serif;letter-spacing:-.01em}
.mono{font-family:'DM Mono',monospace}

/* ══════════════════════════════════════════
   LOADING SCREEN
══════════════════════════════════════════ */
#load-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:9000;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#load-screen.on{display:flex}
.load-logo{width:48px;height:48px;border:2px solid var(--gold-bd);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:22px;color:var(--gold);position:relative;overflow:hidden}
.load-logo::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--gold-bg),transparent);animation:shimmer 1.5s ease-in-out infinite}
@keyframes shimmer{0%,100%{opacity:.5}50%{opacity:1}}
.load-ring{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#load-msg{font-size:12px;color:var(--t3);letter-spacing:.05em;text-transform:uppercase}

/* ══════════════════════════════════════════
   LOGIN PAGE
══════════════════════════════════════════ */
#login-page{height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden}
#login-page::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 15% 50%,rgba(201,168,76,.05) 0%,transparent 60%),radial-gradient(ellipse 40% 60% at 85% 20%,rgba(59,125,216,.04) 0%,transparent 50%)}
#login-page::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold-bd),transparent)}
.lcard{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r3);padding:44px 40px;width:400px;max-width:95vw;box-shadow:var(--shadow);position:relative;overflow:hidden;animation:fadeUp .4s ease}
.lcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.llogo{display:flex;align-items:center;gap:11px;margin-bottom:30px}
.llogo-mark{width:40px;height:40px;border:1.5px solid var(--gold-bd);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:18px;color:var(--gold);background:var(--gold-bg)}
.llogo-text{font-family:'Playfair Display',serif;font-size:22px;color:var(--t);letter-spacing:.01em}
.ltag{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.12em;margin-left:auto}
.ltitle{font-size:24px;font-weight:700;color:var(--t);margin-bottom:4px;letter-spacing:-.02em}
.lsub{font-size:12px;color:var(--t3);margin-bottom:26px}
.lfield{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.lfield label{font-size:10px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.1em}
.lfield input{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:10px 13px;font-size:13px;color:var(--t);font-family:'DM Sans',sans-serif;outline:none;width:100%;transition:border-color .15s,box-shadow .15s}
.lfield input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-bg)}
.lerr{font-size:11px;color:var(--red);min-height:18px;margin-top:-6px;margin-bottom:4px}
.btn-login{width:100%;padding:12px;background:var(--gold);border:none;border-radius:var(--r);color:#0d1117;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.03em;transition:all .15s;margin-bottom:14px}
.btn-login:hover:not(:disabled){background:var(--gold2);transform:translateY(-1px);box-shadow:0 4px 16px rgba(201,168,76,.3)}
.btn-login:disabled{opacity:.55;cursor:not-allowed;transform:none}
.lnote{text-align:center;font-size:11px;color:var(--t4)}

/* ══════════════════════════════════════════
   BRANCH AUDIT CHECKLIST
══════════════════════════════════════════ */
.audit-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.audit-sum-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;text-align:center}
.audit-sum-v{font-family:'Playfair Display',serif;font-size:26px;color:var(--t);line-height:1;margin-bottom:3px}
.audit-sum-l{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;font-weight:600}
.audit-table-wrap{overflow-x:auto;margin-bottom:14px}
.audit-table{width:100%;border-collapse:collapse;font-size:12px}
.audit-table th{padding:8px 10px;text-align:left;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;border-bottom:2px solid var(--border2);background:var(--bg3);white-space:nowrap}
.audit-table th:not(:first-child){text-align:center}
.audit-table td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.audit-table tr:last-child td{border-bottom:none}
.audit-table tr:hover td{background:var(--bg4)}
.audit-branch-name{font-weight:600;color:var(--t);font-size:12px}
.audit-cb-cell{text-align:center}
/* OK/Dash toggle buttons */
.audit-toggle{display:inline-flex;border-radius:6px;overflow:hidden;border:1px solid var(--border2);font-size:10px;font-weight:700}
.audit-toggle button{padding:4px 10px;border:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:10px;font-weight:700;transition:all .15s;background:var(--bg4);color:var(--t3)}
.audit-toggle button.ok.active{background:var(--green-bg);color:var(--green);border-right:1px solid var(--green-bd)}
.audit-toggle button.dash.active{background:var(--red-bg);color:var(--red)}
.audit-toggle button:disabled{cursor:not-allowed;opacity:.5}
.audit-num-inp{background:var(--bg3);border:1px solid var(--border2);border-radius:5px;padding:4px 8px;font-size:11px;color:var(--t);font-family:'DM Sans',sans-serif;width:130px;outline:none;transition:all .15s}
.audit-num-inp:focus{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold-bg)}
.audit-num-inp:disabled{opacity:.35;cursor:not-allowed}
.audit-num-inp::placeholder{color:var(--t4)}
.audit-mf-inp{background:var(--bg3);border:1px solid var(--border2);border-radius:5px;padding:4px 8px;font-size:11px;color:var(--t);font-family:'DM Sans',sans-serif;width:130px;outline:none}
.audit-mf-inp:focus{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold-bg)}
.audit-mf-inp:disabled{opacity:.35;cursor:not-allowed}
.audit-mf-inp::placeholder{color:var(--t4)}
.audit-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;font-family:'DM Mono',monospace}
.audit-badge.bill{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd)}
.audit-badge.gc{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
.audit-badge.mf{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.audit-save-bar{display:flex;justify-content:flex-end;padding:10px 0 4px;gap:8px}
.branch-pick-item{display:flex;align-items:center;gap:8px;padding:6px 4px;border-bottom:1px solid var(--border);font-size:12px;color:var(--t2)}
.branch-pick-item:last-child{border-bottom:none}
.branch-pick-item input[type=checkbox]{accent-color:var(--gold);width:14px;height:14px}
.audit-type-tag{background:var(--teal-bg);color:var(--teal);border:1px solid var(--teal-bd);font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;font-family:'DM Mono',monospace;text-transform:uppercase}
/* Memo table */
.memo-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.memo-table th{padding:7px 10px;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;border-bottom:2px solid var(--border2);background:var(--bg3)}
.memo-table td{padding:6px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
.memo-inp{background:var(--bg3);border:1px solid var(--border2);border-radius:5px;padding:5px 8px;font-size:12px;color:var(--t);font-family:'DM Sans',sans-serif;width:100%;outline:none}
.memo-inp:focus{border-color:var(--gold)}
.memo-inp:disabled{opacity:.4;cursor:not-allowed}
.memo-del{background:none;border:none;cursor:pointer;color:var(--red);font-size:14px;padding:2px 6px;border-radius:4px;transition:background .15s}
.memo-del:hover{background:var(--red-bg)}

/* ══════════════════════════════════════════
   DAY SHEET
══════════════════════════════════════════ */
.ds-month-hd{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold);margin-bottom:14px;letter-spacing:.02em}
.ds-table-wrap{overflow-x:auto}
.ds-table{width:100%;border-collapse:collapse;font-size:12px;min-width:780px}
.ds-table th{padding:9px 10px;text-align:left;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;border-bottom:2px solid var(--border2);background:var(--bg3);white-space:nowrap;position:sticky;top:0;z-index:2}
.ds-table td{padding:7px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
.ds-table tr:hover td{background:var(--bg4)}
.ds-table tr.ds-today td{background:var(--gold-bg)}
.ds-inp{background:transparent;border:none;border-bottom:1px solid var(--border2);border-radius:0;padding:3px 4px;font-size:12px;color:var(--t);font-family:'DM Sans',sans-serif;width:100%;outline:none;transition:border-color .15s;min-width:80px}
.ds-inp:focus{border-bottom-color:var(--gold)}
.ds-inp:disabled{opacity:.5;cursor:not-allowed}
.ds-inp::placeholder{color:var(--t4)}
.ds-inp.amount{font-family:'DM Mono',monospace;text-align:right}
.ds-sel{background:var(--bg3);border:1px solid var(--border2);border-radius:5px;padding:4px 6px;font-size:11px;color:var(--t);font-family:'DM Sans',sans-serif;outline:none;cursor:pointer}
.ds-sel:disabled{opacity:.5;cursor:not-allowed}
.ds-url-inp{background:transparent;border:none;border-bottom:1px solid var(--border2);padding:3px 4px;font-size:11px;color:var(--blue);font-family:'DM Sans',sans-serif;width:100%;outline:none;min-width:100px}
.ds-url-inp:focus{border-bottom-color:var(--gold)}
.ds-url-inp:disabled{opacity:.5;cursor:not-allowed}
.ds-save-btn{padding:5px 14px;background:var(--gold);border:none;border-radius:var(--r);color:#0d1117;font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.ds-save-btn:hover:not(:disabled){background:var(--gold2)}
.ds-save-btn:disabled{opacity:.4;cursor:not-allowed}
.ds-locked{font-size:10px;color:var(--t3);font-style:italic}
.ds-edit-btn{padding:3px 10px;background:var(--blue-bg);border:1px solid var(--blue-bd);color:var(--blue);border-radius:5px;font-size:10px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.ds-add-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-top:1px solid var(--border);margin-top:4px}
.ds-filters{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}

/* ══════════════════════════════════════════
   REPORTS / PERFORMANCE
══════════════════════════════════════════ */
.rpt-score-ring{position:relative;display:inline-flex;align-items:center;justify-content:center;width:110px;height:110px;flex-shrink:0}
.rpt-score-ring svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
.rpt-score-val{font-family:'Playfair Display',serif;font-size:30px;color:var(--t);line-height:1;text-align:center}
.rpt-score-lbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-top:2px;text-align:center}
.rpt-user-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;transition:all .15s;cursor:pointer}
.rpt-user-card:hover{border-color:var(--border3);background:var(--bg4)}
.rpt-bar-wrap{flex:1;display:flex;flex-direction:column;gap:5px}
.rpt-bar-row{display:flex;align-items:center;gap:8px;font-size:11px}
.rpt-bar-lbl{width:70px;color:var(--t3);font-size:10px;text-align:right;flex-shrink:0}
.rpt-bar-bg{flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.rpt-bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
.rpt-stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.rpt-stat{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:12px;text-align:center}
.rpt-stat-v{font-family:'Playfair Display',serif;font-size:24px;color:var(--t);line-height:1;margin-bottom:3px}
.rpt-stat-l{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em}
.print-btn{padding:7px 16px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);color:var(--t2);font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:'DM Sans',sans-serif;transition:all .15s}
.print-btn:hover{background:var(--bg4);border-color:var(--border3);color:var(--t)}
/* Print preview modal */
#modal-print .modal{max-width:720px;width:95vw}
.print-preview{background:#fff;color:#111;padding:32px;font-family:'DM Sans',sans-serif;font-size:12px;border-radius:var(--r);line-height:1.6}
.print-preview h1{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:4px;color:#111}
.print-preview h2{font-size:14px;font-weight:700;margin:16px 0 8px;color:#222;border-bottom:1px solid #ddd;padding-bottom:4px}
.print-preview table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:12px}
.print-preview th{background:#f5f5f5;padding:6px 8px;text-align:left;font-weight:700;border:1px solid #ddd;font-size:10px;text-transform:uppercase}
.print-preview td{padding:5px 8px;border:1px solid #ddd}
.print-preview .score-big{font-size:36px;font-weight:700;color:#c9a84c;font-family:'Playfair Display',serif}
@media print{
  body *{visibility:hidden}
  #print-content,#print-content *{visibility:visible}
  #print-content{position:fixed;top:0;left:0;width:100%;background:#fff;padding:20px}
}

/* ── GRACE PERIOD / PERMISSION ── */
.grace-warn{background:var(--amber-bg);border:1px solid var(--amber-bd);border-radius:var(--r);padding:8px 14px;margin-bottom:10px;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--amber)}
.grace-locked{background:var(--red-bg);border:1px solid var(--red-bd);border-radius:var(--r);padding:10px 14px;margin-bottom:10px;font-size:11px;color:var(--red)}
.perm-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:5px;font-size:10px;font-weight:700;font-family:'DM Mono',monospace}
.perm-badge.pending{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd)}
.perm-badge.approved{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.perm-badge.denied{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}

/* ══════════════════════════════════════════
   FREIGHT ENTRY
══════════════════════════════════════════ */
.fr-hd{font-family:'Playfair Display',serif;font-size:19px;color:var(--gold);letter-spacing:.01em}
.fr-tab-bar{display:flex;gap:0;border-bottom:2px solid var(--border2);margin-bottom:16px}
.fr-tab{padding:9px 22px;font-size:12px;font-weight:600;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;font-family:'DM Sans',sans-serif}
.fr-tab.on{color:var(--gold);border-bottom-color:var(--gold)}
.fr-tab:hover:not(.on){color:var(--t2)}
/* Month buttons */
.fr-mo-bar{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.fr-mo-btn{padding:3px 10px;border-radius:5px;border:1px solid var(--border2);background:var(--bg3);color:var(--t2);font-size:10px;font-weight:500;cursor:pointer;transition:all .13s;font-family:'DM Mono',monospace}
.fr-mo-btn.on{border-color:var(--gold);background:var(--gold-bg);color:var(--gold);font-weight:700}
/* Grid */
.fr-wrap{overflow-x:auto;padding-bottom:6px}
.fr-grid{border-collapse:collapse;min-width:max-content;font-size:11px}
.fr-grid th{padding:7px 10px;background:var(--bg3);border:1px solid var(--border2);font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap;text-align:center;position:sticky;top:0;z-index:3}
.fr-grid th.branch-col{text-align:left;min-width:200px;position:sticky;left:0;z-index:4;background:var(--bg3)}
.fr-grid th.date-col{min-width:130px}
.fr-grid th.date-col.today{background:var(--gold-bg);color:var(--gold)}
.fr-grid th.date-col.filled{background:var(--green-bg);color:var(--green)}
.fr-grid th.date-col.missing{background:var(--red-bg);color:var(--red)}
.fr-grid td{padding:5px 8px;border:1px solid var(--border);vertical-align:middle;background:var(--bg2)}
.fr-grid td.branch-name{font-weight:600;color:var(--t);font-size:11px;position:sticky;left:0;z-index:2;background:var(--bg2);white-space:nowrap}
.fr-grid td.branch-group{font-weight:700;color:var(--gold);font-size:11px;background:var(--gold-bg);position:sticky;left:0;z-index:2;letter-spacing:.04em;padding:6px 10px;border-left:3px solid var(--gold)}
.fr-grid td.today-cell{background:var(--gold-bg)}
.fr-grid td.filled-cell{background:var(--green-bg)}
.fr-grid td.missing-cell{background:var(--red-bg)}
.fr-grid tr:hover td:not(.branch-group){filter:brightness(1.06)}
/* Cell inputs */
.fr-cell-wrap{display:flex;flex-direction:column;gap:3px;min-width:118px}
.fr-cell-row{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--t3)}
.fr-cell-lbl{width:26px;font-size:9px;color:var(--t3);font-weight:600;flex-shrink:0;text-transform:uppercase}
.fr-cinp{background:transparent;border:none;border-bottom:1px solid var(--border2);padding:2px 3px;font-size:10px;color:var(--t);font-family:'DM Sans',sans-serif;width:70px;outline:none}
.fr-cinp:focus{border-bottom-color:var(--gold)}
.fr-cinp:disabled{opacity:.4;cursor:not-allowed}
.fr-cinp.amount{font-family:'DM Mono',monospace;width:80px}
.fr-cb{width:14px;height:14px;cursor:pointer;flex-shrink:0}
.fr-cb:disabled{cursor:not-allowed;opacity:.4}
.fr-cb.done{accent-color:var(--green)}
.fr-cb.pending{accent-color:var(--amber)}
.fr-save-cell{text-align:center;padding:4px 6px}
.fr-save-btn{padding:3px 10px;background:var(--gold);border:none;border-radius:4px;color:#0d1117;font-size:10px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
.fr-save-btn:hover{background:var(--gold2)}
.fr-save-btn:disabled{opacity:.4;cursor:not-allowed}
.fr-lock{font-size:10px;color:var(--t3)}
.fr-miss{font-size:10px;color:var(--red);font-weight:700}
/* Filled cell display */
.fr-filled-cell{display:flex;flex-direction:column;gap:2px;min-width:118px}
.fr-filled-row{display:flex;align-items:center;gap:4px;font-size:10px}
.fr-filled-lbl{width:26px;font-size:9px;color:var(--t3);font-weight:600;text-transform:uppercase;flex-shrink:0}
.fr-chk-done{color:var(--green);font-weight:700;font-size:11px}
.fr-chk-no{color:var(--red);font-size:11px}
/* Summary bar */
.fr-stat-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.fr-stat{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:8px 14px;display:flex;align-items:center;gap:8px}
.fr-stat-v{font-family:'Playfair Display',serif;font-size:20px;color:var(--t);line-height:1}
.fr-stat-l{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em}
/* Branch management */
.fr-branch-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--border);font-size:12px;color:var(--t)}
.fr-branch-item:last-child{border-bottom:none}

/* ── REALTIME INDICATOR ── */
.rt-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;cursor:help;transition:background .3s}
.rt-dot.connected{background:var(--green);box-shadow:0 0 5px var(--green)}
.rt-dot.connecting{background:var(--amber);animation:rt-pulse .8s infinite alternate}
.rt-dot.disconnected{background:var(--red)}
@keyframes rt-pulse{from{opacity:.4}to{opacity:1}}
#rt-pop{position:fixed;bottom:70px;right:22px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:8px 14px;font-size:11px;color:var(--t2);box-shadow:var(--shadow2);opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;z-index:888;max-width:280px}
#rt-pop.on{opacity:1;transform:none}

/* ══════════════════════════════════════════
   APP SHELL
══════════════════════════════════════════ */
#app{display:none;height:100vh;flex-direction:row}
#app.on{display:flex}

/* ── SIDEBAR ── */
#sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:relative}
#sidebar::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(to bottom,transparent,var(--gold-bd) 30%,var(--gold-bd) 70%,transparent)}
.sb-head{padding:18px 14px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-mark{width:30px;height:30px;border:1.5px solid var(--gold-bd);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:14px;color:var(--gold);background:var(--gold-bg);flex-shrink:0}
.sb-logo-t{font-family:'Playfair Display',serif;font-size:16px;color:var(--t);letter-spacing:.01em}
.sb-user{margin:10px 10px 8px;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);display:flex;align-items:center;gap:9px}
.sb-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;font-family:'DM Mono',monospace;border:1.5px solid transparent}
.sb-name{font-size:12px;font-weight:600;color:var(--t);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-role{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;font-weight:500}
nav{flex:1;overflow-y:auto;padding:8px 0}
.nav-lbl{padding:10px 17px 4px;font-size:9px;font-weight:600;color:var(--t4);text-transform:uppercase;letter-spacing:.15em}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 14px;margin:1px 8px;border-radius:var(--r);cursor:pointer;color:var(--t2);font-size:12px;font-weight:500;transition:all .13s;border:1px solid transparent;position:relative}
.nav-item:hover{background:var(--bg3);color:var(--t)}
.nav-item.on{background:var(--gold-bg);color:var(--gold);border-color:var(--gold-bd);font-weight:600}
.nav-ic{font-size:12px;width:16px;text-align:center;flex-shrink:0;opacity:.7}
.nav-item.on .nav-ic{opacity:1}
.nav-bdg{margin-left:auto;background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:6px;min-width:16px;text-align:center;font-family:'DM Mono',monospace}
.nav-div{height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent);margin:6px 10px}
.sb-foot{padding:10px;border-top:1px solid var(--border);display:flex;gap:6px}
.btn-logout{flex:1;padding:7px 10px;background:transparent;border:1px solid var(--border);border-radius:var(--r);color:var(--t3);font-size:11px;font-weight:600;cursor:pointer;transition:all .13s;display:flex;align-items:center;justify-content:center;gap:5px;font-family:'DM Sans',sans-serif}
.btn-logout:hover{border-color:var(--red);color:var(--red);background:var(--red-bg)}
.sb-theme{width:32px;height:32px;background:transparent;border:1px solid var(--border);border-radius:var(--r);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;transition:all .13s;flex-shrink:0}
.sb-theme:hover{background:var(--bg3);border-color:var(--border2)}

/* ── TOPBAR ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 22px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative}
#topbar::after{content:'';position:absolute;bottom:0;left:22px;right:22px;height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent)}
.tb-l{display:flex;align-items:center;gap:10px}
.page-title{font-family:'Playfair Display',serif;font-size:17px;color:var(--t)}
.tb-breadcrumb{font-size:11px;color:var(--t3)}
.tb-r{display:flex;align-items:center;gap:8px;position:relative}
.btn-new{padding:7px 16px;background:var(--gold);border:none;border-radius:var(--r);color:#0d1117;font-size:11px;font-weight:700;cursor:pointer;transition:all .13s;display:none;align-items:center;gap:5px;font-family:'DM Sans',sans-serif;letter-spacing:.03em}
.btn-new:hover{background:var(--gold2);transform:translateY(-1px)}
.icon-btn{width:34px;height:34px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;transition:all .13s;position:relative;flex-shrink:0}
.icon-btn:hover{background:var(--bg4);border-color:var(--border2)}
.notif-dot{position:absolute;top:6px;right:6px;width:6px;height:6px;background:var(--red);border-radius:50%;border:1.5px solid var(--bg2);display:none}
#content{flex:1;overflow-y:auto;padding:20px 22px}
.page{display:none}
.page.on{display:block;animation:pagein .2s ease}
@keyframes pagein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ══════════════════════════════════════════
   BLOCK CARDS — Signature UI Element
══════════════════════════════════════════ */
.scard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:16px;overflow:hidden;box-shadow:var(--shadow2);position:relative}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent)}
.shead{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
.stitle{font-size:13px;font-weight:600;color:var(--t);display:flex;align-items:center;gap:8px}
.stitle-accent{width:3px;height:14px;border-radius:2px;background:var(--gold);flex-shrink:0}
.sbody{padding:16px 18px}
.empty{padding:40px 18px;text-align:center}
.empty-ic{font-size:30px;margin-bottom:10px;opacity:.5}
.empty-t{font-size:14px;font-weight:600;color:var(--t2);font-family:'Playfair Display',serif}
.empty-s{font-size:11px;color:var(--t3);margin-top:4px}

/* ══════════════════════════════════════════
   STAT BLOCKS — bold grid style
══════════════════════════════════════════ */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:16px 18px;position:relative;overflow:hidden;box-shadow:var(--shadow2);transition:transform .15s,box-shadow .15s}
.stat:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.stat-stripe{position:absolute;top:0;left:0;width:3px;height:100%;border-radius:0}
.stat-stripe.gold{background:var(--gold)}
.stat-stripe.blue{background:var(--blue)}
.stat-stripe.teal{background:var(--teal)}
.stat-stripe.green{background:var(--green)}
.stat-stripe.red{background:var(--red)}
.stat-stripe.amber{background:var(--amber)}
.stat-stripe.purple{background:var(--purple)}
.stat-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.stat-ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}
.stat-v{font-family:'Playfair Display',serif;font-size:30px;color:var(--t);line-height:1;letter-spacing:-.03em;margin-bottom:4px}
.stat-l{font-size:10px;color:var(--t2);font-weight:600;text-transform:uppercase;letter-spacing:.08em}
.stat-sub{font-size:10px;color:var(--t3);margin-top:2px}
.prog-wrap{margin-top:8px}
.prog{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .6s ease}
.prog-fill.gold{background:linear-gradient(90deg,var(--gold),var(--gold2))}
.prog-fill.blue{background:linear-gradient(90deg,var(--blue),#60a5fa)}
.prog-fill.green{background:linear-gradient(90deg,var(--green),#4ade80)}
.prog-fill.teal{background:linear-gradient(90deg,var(--teal),#5eead4)}

/* ══════════════════════════════════════════
   TASK CARDS
══════════════════════════════════════════ */
.tcard{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.tcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:0;transition:opacity .15s}
.tcard.pri-high::before{background:var(--red);opacity:.7}
.tcard.pri-med::before{background:var(--amber);opacity:.6}
.tcard.pri-low::before{background:var(--green);opacity:.5}
.tcard:hover{border-color:var(--border3);background:var(--bg4);transform:translateX(2px)}
.tcard-row1{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
.tcard-title{font-size:13px;font-weight:600;color:var(--t);line-height:1.4}
.tcard-desc{font-size:11px;color:var(--t3);margin-top:3px;line-height:1.5}
.tcard-row2{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.tcard-row3{display:flex;align-items:center;justify-content:space-between;padding-top:9px;border-top:1px solid var(--border)}
.tassignee{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t3)}
.tdue{font-size:10px;color:var(--t3);display:flex;align-items:center;gap:3px}
.tdue.ov{color:var(--red);font-weight:600}
.tdue.td{color:var(--amber);font-weight:600}
.tcard-badges{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.recurring-tag{font-size:9px;color:var(--teal);border:1px solid var(--teal-bd);background:var(--teal-bg);padding:1px 5px;border-radius:4px;font-weight:600;letter-spacing:.04em}

/* ══════════════════════════════════════════
   BADGES
══════════════════════════════════════════ */
.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;border:1px solid transparent;white-space:nowrap;font-family:'DM Mono',monospace}
.b-go{background:var(--gold-bg);color:var(--gold);border-color:var(--gold-bd)}
.b-bl{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-bd)}
.b-gr{background:var(--green-bg);color:var(--green);border-color:var(--green-bd)}
.b-am{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-bd)}
.b-rd{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
.b-pu{background:var(--purple-bg);color:var(--purple);border-color:var(--purple-bd)}
.b-tl{background:var(--teal-bg);color:var(--teal);border-color:var(--teal-bd)}
.b-gy{background:rgba(100,116,139,.08);color:var(--t3);border-color:rgba(100,116,139,.15)}
.ov-tag{background:var(--red-bg);border:1px solid var(--red-bd);color:var(--red);font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px;text-transform:uppercase;font-family:'DM Mono',monospace}
.prio{display:inline-flex;align-items:center;gap:4px;font-weight:600;font-size:11px}
.prio::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
.ph{color:var(--red)}.ph::before{background:var(--red)}
.pm{color:var(--amber)}.pm::before{background:var(--amber)}
.pl{color:var(--green)}.pl::before{background:var(--green)}
.mav{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;font-family:'DM Mono',monospace}

/* ══════════════════════════════════════════
   FILTER BAR
══════════════════════════════════════════ */
.fbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:12px 18px;border-bottom:1px solid var(--border);background:var(--bg2)}
.fbar input,.fbar select{height:32px;padding:0 10px;font-size:11px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--t);outline:none;font-family:'DM Sans',sans-serif;transition:border-color .13s}
.fbar input:focus,.fbar select:focus{border-color:var(--gold)}
.fbar select option{background:var(--bg3)}
.fbar input{min-width:160px}
.fbtn{height:32px;padding:0 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--t2);font-size:11px;font-weight:600;cursor:pointer;transition:all .13s;font-family:'DM Sans',sans-serif}
.fbtn:hover{background:var(--bg4);color:var(--t);border-color:var(--border2)}
.fbtn.active{background:var(--gold-bg);color:var(--gold);border-color:var(--gold-bd)}

/* ══════════════════════════════════════════
   MODAL
══════════════════════════════════════════ */
.moverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.moverlay.on{display:flex;animation:overlay-in .2s ease}
@keyframes overlay-in{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r3);width:580px;max-width:95vw;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 32px 80px rgba(0,0,0,.6);animation:modal-in .22s ease;position:relative}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold-bd),transparent)}
.modal.lg{width:700px}
@keyframes modal-in{from{opacity:0;transform:scale(.97) translateY(8px)}to{opacity:1;transform:none}}
.mhead{padding:18px 22px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
.mtitle{font-family:'Playfair Display',serif;font-size:16px;color:var(--t)}
.mclose{width:28px;height:28px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:var(--t3);transition:all .13s;flex-shrink:0}
.mclose:hover{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
.mbody{padding:20px 22px;overflow-y:auto;flex:1}
.mfoot{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;background:var(--bg2)}

/* ══════════════════════════════════════════
   FORMS
══════════════════════════════════════════ */
.fgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.fgrid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg.full{grid-column:1/-1}
label{font-size:10px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.1em}
input,select,textarea{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:8px 11px;font-size:12px;color:var(--t);font-family:'DM Sans',sans-serif;outline:none;width:100%;transition:border-color .13s,box-shadow .13s}
input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-bg)}
select option{background:var(--bg3)}
textarea{resize:vertical;min-height:76px}
.faction{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}

/* ══════════════════════════════════════════
   BUTTONS
══════════════════════════════════════════ */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;border:1px solid transparent;font-family:'DM Sans',sans-serif;transition:all .13s;line-height:1;letter-spacing:.02em}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}
.bg-{background:var(--gold);color:#0d1117;border-color:transparent}.bg-:hover:not(:disabled){background:var(--gold2);transform:translateY(-1px)}
.bp{background:var(--blue);color:#fff;border-color:var(--blue2)}.bp:hover:not(:disabled){background:var(--blue2)}
.bs{background:var(--green);color:#0d1117;border-color:transparent}.bs:hover:not(:disabled){filter:brightness(1.1)}
.bd{background:var(--red);color:#fff;border-color:var(--red2)}.bd:hover:not(:disabled){background:var(--red2)}
.bw{background:var(--amber);color:#0d1117;border-color:transparent}.bw:hover:not(:disabled){filter:brightness(1.1)}
.bt{background:var(--teal);color:#0d1117;border-color:transparent}.bt:hover:not(:disabled){filter:brightness(1.1)}
.bo{background:transparent;color:var(--t2);border-color:var(--border)}.bo:hover:not(:disabled){background:var(--bg3);color:var(--t);border-color:var(--border2)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-xs{padding:3px 8px;font-size:10px}

/* ══════════════════════════════════════════

function overdue(t){
  if(['Verified','Completed'].includes(t.status)) return false;
  return t.due_date && t.due_date < today();

// Returns days past due (0 if not overdue)
function daysPastDue(t){
  if(!t.due_date||['Verified','Completed'].includes(t.status)) return 0;
  const due=new Date(t.due_date), now=new Date(today());
  const diff=Math.floor((now-due)/(1000*60*60*24));
  return Math.max(0,diff);
}

// Grace period = 4 days. After that user needs permission.
const GRACE_DAYS = 4;
function isGraceLocked(t){
  if(['Verified','Completed'].includes(t.status)) return false;
  return daysPastDue(t) > GRACE_DAYS;
}

// Check if this user has an approved permission for this task
function hasOverduePermission(taskId){
  return (C.overduePerms||[]).some(p=>p.task_id===taskId&&p.user_id===CU.id&&p.status==='approved');
}

// Check if user already sent a pending request
function hasPendingPermRequest(taskId){
  return (C.overduePerms||[]).some(p=>p.task_id===taskId&&p.user_id===CU.id&&p.status==='pending');
}
function today(){ return new Date().toISOString().slice(0,10); }
function isToday(d){ return d === today(); }
function isTomorrow(d){ const t=new Date(); t.setDate(t.getDate()+1); return d===t.toISOString().slice(0,10); }

function fmt(s){
  if(!s) return '—';
  try{ return new Date(s).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}); }
  catch{ return s; }
}
function ago(s){
  if(!s) return '';
  const d=Date.now()-new Date(s).getTime(), m=Math.floor(d/60000);
  if(m<1) return 'just now';
  if(m<60) return m+'m ago';
  const h=Math.floor(m/60);
  if(h<24) return h+'h ago';
  return Math.floor(h/24)+'d ago';
}

function visibleTasks(){
  const all=allTasks(), u=CU;
  if(u.role==='superadmin') return all;
  if(u.role==='admin') return all.filter(t=>
    t.created_by===u.id||t.assigned_to===u.id||t.assigned_to_user===u.id||t.assigned_by===u.id);
  if(u.role==='subadmin') return all.filter(t=>
    t.assigned_to===u.id||t.assigned_to_user===u.id||t.created_by===u.id);
  return all.filter(t=>
    t.assigned_to_user===u.id||(t.self_assigned&&t.created_by===u.id));
}

function myTasks(){
  const all=allTasks(), u=CU;
  if(u.role==='user') return all.filter(t=>t.assigned_to_user===u.id||(t.self_assigned&&t.created_by===u.id));
  if(u.role==='subadmin') return all.filter(t=>t.assigned_to===u.id||t.created_by===u.id);
  return all.filter(t=>t.created_by===u.id);
}

let realtimeChannel = null;
let _rtConnected = false;
let _pollTimer = null;
let _rtPopTimer = null;

function logout(){
  CU = null;
  _rtConnected=false;
  stopPolling();
  if(realtimeChannel){ try{ sb.removeChannel(realtimeChannel); }catch(e){} realtimeChannel=null; }
  try{ sessionStorage.removeItem('tf_s'); }catch(e){}
  document.getElementById('app').classList.remove('on');

  toast('Signed out','in');
}

function setupRealtime(){
  // Clean up old channel if exists
  if(realtimeChannel){ sb.removeChannel(realtimeChannel); realtimeChannel=null; }

  realtimeChannel = sb.channel('taskflow-live')
    // ── Tasks: any INSERT / UPDATE / DELETE ──
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'tasks'},async payload=>{
      const exists=C.tasks.find(t=>t.id===payload.new.id);
      if(!exists){ C.tasks.unshift(payload.new); }
      renderPage(curPage); updateBadges();
      showRealtimePop('📋 New task added');
    })
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'tasks'},async payload=>{
      const idx=C.tasks.findIndex(t=>t.id===payload.new.id);
      if(idx!==-1) C.tasks[idx]=payload.new; else C.tasks.unshift(payload.new);
      // If task detail is open for this task, refresh it
      if(curTaskId===payload.new.id){
        document.getElementById('detail-title').textContent=payload.new.title;
        renderDetail(payload.new);
      }
      renderPage(curPage); updateBadges();
      showRealtimePop('✏️ Task updated: '+payload.new.title);
    })
    .on('postgres_changes',{event:'DELETE',schema:'public',table:'tasks'},payload=>{
      C.tasks=C.tasks.filter(t=>t.id!==payload.old.id);
      if(curTaskId===payload.old.id) closeM('modal-detail');
      renderPage(curPage); updateBadges();
    })
    // ── Comments: INSERT (new comments appear live) ──
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'comments'},async payload=>{
      const c=payload.new;
      const exists=C.comments.find(x=>x.id===c.id);
      if(!exists){ C.comments.push(c); }
      // If the related task detail modal is open, refresh it
      if(curTaskId===c.task_id){
        const t=C.tasks.find(x=>x.id===c.task_id);
        if(t) renderDetail(t);
        // Highlight new comment visually
        setTimeout(()=>{
          const cmtList=document.getElementById('cmt-list');
          if(cmtList){ const last=cmtList.lastElementChild; if(last){ last.style.transition='background .5s'; last.style.background='var(--blue-bg)'; setTimeout(()=>last.style.background='',1500); } }
        },100);
      }
      // Show a live indicator if someone else commented
      if(c.user_id!==CU.id){
        const author=getUser(c.user_id);
        showRealtimePop(`💬 ${author?.name||'Someone'} commented`);
      }
    })
    // ── Notifications for THIS user ──
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'notifications',filter:`user_id=eq.${CU.id}`},async payload=>{
      const n=payload.new;
      const exists=C.notifications.find(x=>x.id===n.id);
      if(!exists){ C.notifications.unshift(n); }
      updateBadges();
      renderNotifs();
      showRealtimePop('🔔 '+n.text.replace(/<[^>]+>/g,''));
    })
    .subscribe((status)=>{
      const ind=document.getElementById('rt-ind');
      if(status==='SUBSCRIBED'){
        _rtConnected=true;
        if(ind){ ind.className='rt-dot connected'; ind.title='Live — real-time active'; }
      } else if(status==='CLOSED'||status==='CHANNEL_ERROR'){
        _rtConnected=false;
        if(ind){ ind.className='rt-dot disconnected'; ind.title='Polling mode (8s refresh)'; }
      } else {
        _rtConnected=false;
        if(ind){ ind.className='rt-dot connecting'; ind.title='Connecting…'; }
      }
    });
  // Always start polling as a safety net
  startPollingFallback();
}

function showRealtimePop(msg){
  const el=document.getElementById('rt-pop');
  if(!el) return;
  el.textContent=msg;
  el.classList.add('on');
  if(_rtPopTimer) clearTimeout(_rtPopTimer);
  _rtPopTimer=setTimeout(()=>el.classList.remove('on'),3000);
}

// ── POLLING FALLBACK: refreshes every 8s if realtime not connected ──
function startPollingFallback(){
  stopPolling();
  _pollTimer=setInterval(async()=>{
    if(_rtConnected) return; // realtime is working, skip poll
    const prev=C.tasks.map(t=>t.id+t.updated_at+t.status).join('|');
    const {data:tasks}=await sb.from('tasks').select('*').order('created_at',{ascending:false});
    if(!tasks) return;
    const next=tasks.map(t=>t.id+t.updated_at+t.status).join('|');
    if(prev!==next){
      C.tasks=tasks;
      renderPage(curPage);
      updateBadges();
      showRealtimePop('🔄 Tasks updated');
    }
    // Also refresh notifications
    const {data:notifs}=await sb.from('notifications').select('*').eq('user_id',CU.id).order('created_at',{ascending:false}).limit(40);
    if(notifs){
      const prevUnread=(C.notifications||[]).filter(n=>!n.read).length;
      C.notifications=notifs;
      const newUnread=notifs.filter(n=>!n.read).length;
      if(newUnread>prevUnread){ updateBadges(); renderNotifs(); showRealtimePop('🔔 New notification'); }
      else updateBadges();
    }
  },8000);
}

function stopPolling(){ if(_pollTimer){ clearInterval(_pollTimer); _pollTimer=null; } }

async function restoreSession(){
  try{
    const s = sessionStorage.getItem('tf_s');
    if(!s) return;
    const saved = JSON.parse(s);
    if(!saved?.id) return;
    document.getElementById('login-page').style.display='none';
    document.getElementById('load-screen').classList.add('on');
    setLoadMsg('Restoring session…');
    const {data} = await sb.from('users').select('*').eq('id',saved.id).eq('active',true).single();
    if(!data){
      document.getElementById('load-screen').classList.remove('on');
      document.getElementById('login-page').style.display='flex';
      return;
    }
    CU = data;
    await loadAll();
    document.getElementById('load-screen').classList.remove('on');
    document.getElementById('app').classList.add('on');
    renderSidebar();
    nav('dashboard');
    setupRealtime();
    setTimeout(autoCleanupVerifiedTasks, 1500);
  }catch(e){
    document.getElementById('load-screen').classList.remove('on');
    document.getElementById('login-page').style.display='flex';
  }
}

function renderTaskList(){
  let t=visibleTasks();
  if(TF.userId){
    const uid=parseInt(TF.userId);
    t=t.filter(x=>x.assigned_to_user===uid||x.assigned_to===uid);
  }
  if(TF.search){
    const s=TF.search.toLowerCase();
    t=t.filter(x=>x.title.toLowerCase().includes(s)||
      (x.description||'').toLowerCase().includes(s)||
      (getUser(x.assigned_to_user)?.name||'').toLowerCase().includes(s));
  }
  if(TF.type)     t=t.filter(x=>x.type===TF.type);
  if(TF.priority) t=t.filter(x=>x.priority===TF.priority);
  if(TF.status)   t=t.filter(x=>x.status===TF.status);

  const pOrder={High:0,Medium:1,Low:2};
  const sOrder={Created:0,Assigned:1,'In Progress':2,Completed:3,Verified:4,Rejected:5};
  if(TF.sortBy==='priority') t.sort((a,b)=>pOrder[a.priority]-pOrder[b.priority]||new Date(a.due_date)-new Date(b.due_date));
  else if(TF.sortBy==='due') t.sort((a,b)=>new Date(a.due_date)-new Date(b.due_date));
  else if(TF.sortBy==='created') t.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  else if(TF.sortBy==='status') t.sort((a,b)=>sOrder[a.status]-sOrder[b.status]);

  const el=document.getElementById('tlist'); if(!el) return;
  if(!t.length){
    el.innerHTML=`<div class="empty"><div class="empty-ic">◈</div><div class="empty-t">No tasks found</div><div class="empty-s">Adjust your filters</div></div>`;
    return;
  }
  el.innerHTML=t.map(x=>taskCard(x)).join('');
}

  const pcls={High:'ph',Medium:'pm',Low:'pl'}[t.priority]||'pm';
  return `<div class="tcard ${pClass}" onclick="openDetail(${t.id})">
    <div class="tcard-row1">
      <div style="flex:1;min-width:0">
        <div class="tcard-title">${t.title}</div>
        ${t.description?`<div class="tcard-desc">${t.description.slice(0,80)}${t.description.length>80?'…':''}</div>`:''}
      </div>

        <span class="bdg ${statusBadge(t.status)}">${t.status}</span>

    </div>
    <div class="tcard-row2">
      <span class="bdg b-gy">${t.type==='Branch Audit'?'Weekly':t.type}</span>
      ${t.type==='Branch Audit'?'<span class="audit-type-tag">🏦 Audit</span>':''}
      <span class="prio ${pcls}">${t.priority}</span>
      ${t.recurring?'<span class="recurring-tag">↻ Recurring</span>':''}
      ${t.self_assigned?'<span class="bdg b-pu">Self</span>':''}
    </div>
    <div class="tcard-row3">
      <div class="tassignee">
        ${au?`<div class="mav" style="background:${au.color}22;color:${au.color}">${au.avatar}</div><span>${au.name}</span>`:'<span style="color:var(--t4)">Unassigned</span>'}
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        ${isGraceLocked(t)&&!hasOverduePermission(t.id)?`<span style="font-size:9px;color:var(--red);font-weight:700;font-family:'DM Mono',monospace">🔒 LOCKED</span>`:''}
        ${daysPastDue(t)>0&&daysPastDue(t)<=GRACE_DAYS?`<span style="font-size:9px;color:var(--amber);font-weight:700;font-family:'DM Mono',monospace">⚠ ${GRACE_DAYS-daysPastDue(t)}d grace left</span>`:''}
        <div class="tdue ${ov?'ov':td?'td':tom?'td':''}">

      </div>
    </div>
  </div>`;
}

function switchMTab(el,s){
  document.querySelectorAll('#mt-tabs .tab').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  renderMTab(s);
}

function renderMTab(s){
  let t=myTasks(); if(s!=='All') t=t.filter(x=>x.status===s);
  t.sort((a,b)=>{
    if(overdue(a)&&!overdue(b)) return -1;
    if(!overdue(a)&&overdue(b)) return 1;
    return new Date(a.due_date)-new Date(b.due_date);
  });
  const el=document.getElementById('mt-body'); if(!el) return;
  if(!t.length){
    el.innerHTML=`<div class="empty"><div class="empty-ic">🎉</div><div class="empty-t">No ${s==='All'?'':s+' '}tasks</div></div>`;
    return;
  }
  el.innerHTML=t.map(x=>taskCard(x)).join('');
}

const STEPS=['Created','Assigned','In Progress','Completed','Verified'];

async function openDetail(taskId){
  curTaskId=taskId;
  const t=allTasks().find(x=>x.id===taskId); if(!t) return;
  // Load fresh comments for this task
  const {data:cmts}=await sb.from('comments').select('*').eq('task_id',taskId).order('created_at');
  C.comments=C.comments.filter(c=>c.task_id!==taskId).concat(cmts||[]);
  // Load audit data if Branch Audit task
  if(t.type==='Branch Audit'){
    const {data:abr}=await sb.from('audit_branches').select('*').eq('task_id',taskId).order('sort_order');
    C.auditBranches[taskId]=abr||[];
    if(abr&&abr.length){
      const branchIds=abr.map(b=>b.id);
      const {data:acl}=await sb.from('audit_checklist').select('*').in('branch_id',branchIds);
      (acl||[]).forEach(r=>{ C.auditChecklist[r.id]=r; });
      // Also index by branch_id for easy lookup
      C._auditByBranch = C._auditByBranch||{};
      (acl||[]).forEach(r=>{ C._auditByBranch[r.branch_id]=r; });
    }
  }
  document.getElementById('detail-title').textContent=t.title;
  document.getElementById('modal-detail').classList.add('on');
  renderDetail(t);
}

function renderDetail(t){
  const u=CU;
  const creator   =getUser(t.created_by);

  const userAssign=t.assigned_to_user?getUser(t.assigned_to_user):null;

  const ov=overdue(t);

    let cls='';
    if(rj&&i===si) cls='rej'; else if(i<si) cls='done'; else if(i===si) cls='act';
    const line=i<STEPS.length-1?`<div class="step-line${i<si&&!rj?' done':''}"></div>`:'';
    return `<div class="step ${cls}">
      <div class="step-dot">${(i<si&&!rj)?'✓':i+1}</div>

function renderWF(t,u){
  const role=u.role; let h='';
  const subs=allUsers().filter(x=>x.role==='subadmin'&&x.active);
  const usrs=allUsers().filter(x=>x.role==='user'&&x.active);

  if(['superadmin','admin'].includes(role)&&t.status==='Created'){
    h+=`<div class="wbar">
      <span class="wbar-lbl">◈ Assign to Sub Admin</span>
      <div class="wbar-acts">
        <select id="wf-sub"><option value="">— Select Sub Admin —</option>${subs.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select>
        <button class="btn bp btn-sm" onclick="doAssignSub(${t.id})">Assign</button>
      </div>
    </div>`;
    h+=`<div class="wbar">
      <span class="wbar-lbl">⚡ Or Assign Directly to User</span>
      <div class="wbar-acts">
        <select id="wf-ud"><option value="">— Select User —</option>${usrs.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select>
        <button class="btn bo btn-sm" onclick="doAssignDirect(${t.id})">Assign Direct</button>
      </div>
    </div>`;
  }

  if(role==='subadmin'&&t.status==='Assigned'&&t.assigned_to===u.id){
    h=`<div class="wbar">
      <span class="wbar-lbl">◈ Assign to User</span>
      <div class="wbar-acts">
        <select id="wf-u"><option value="">— Select User —</option>${usrs.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select>
        <button class="btn bp btn-sm" onclick="doAssignUser(${t.id})">Assign</button>
      </div>
    </div>`;
  }

  if((role==='user'||(t.self_assigned&&t.created_by===u.id))&&t.status==='In Progress'&&t.assigned_to_user===u.id){
    const dpd = daysPastDue(t);
    const locked = isGraceLocked(t);
    const hasPerm = hasOverduePermission(t.id);
    const pendingReq = hasPendingPermRequest(t.id);

    if(locked && !hasPerm){
      // Grace period exceeded — show lock state
      if(pendingReq){
        h=`<div class="wbar danger">
          <div>
            <div style="font-size:11px;font-weight:700;color:var(--amber);margin-bottom:4px">⏳ Permission Requested</div>
            <div style="font-size:12px;color:var(--t2)">Task is <strong>${dpd} days overdue</strong> (${dpd-GRACE_DAYS} days past grace period). Waiting for Super Admin approval.</div>
          </div>
        </div>`;
      } else {
        h=`<div class="wbar danger">
          <div style="flex:1">
            <div style="font-size:11px;font-weight:700;color:var(--red);margin-bottom:4px">🔒 Task Locked — Grace Period Exceeded</div>
            <div style="font-size:12px;color:var(--t2)">This task is <strong>${dpd} days overdue</strong> (grace period: ${GRACE_DAYS} days). Request Super Admin permission to submit.</div>
          </div>
          <button class="btn bw btn-sm" onclick="requestOverduePermission(${t.id})">🔑 Request Permission</button>
        </div>`;
      }
    } else {
      // Within grace or has permission
      const graceWarn = dpd > 0 && dpd <= GRACE_DAYS ?
        `<div style="font-size:10px;color:var(--amber);margin-bottom:6px">⚠ ${dpd} day${dpd>1?'s':''} overdue · ${GRACE_DAYS-dpd} day${GRACE_DAYS-dpd!==1?'s':''} left in grace period</div>` : '';
      const permBadge = hasPerm ? `<span style="font-size:10px;color:var(--green);margin-right:8px">✓ Permission granted</span>` : '';
      h=`<div class="wbar success">
        <div style="flex:1">
          ${graceWarn}
          <span class="wbar-lbl">Ready to submit this task?</span>
        </div>
        <div class="wbar-acts">
          ${permBadge}
          <button class="btn bs btn-sm" onclick="confirmComplete(${t.id})">✓ Mark Completed</button>
        </div>
      </div>`;
    }
  }

  if(['superadmin','admin','subadmin'].includes(role)&&t.status==='Completed'){
    // superadmin & admin can verify ANY completed task
    // subadmin can only verify tasks assigned through them
    const ok = ['superadmin','admin'].includes(role) || (role==='subadmin'&&t.assigned_to===u.id);
    if(ok) h=`<div class="wbar">
      <span class="wbar-lbl">Review completed task</span>
      <div class="wbar-acts">
        <button class="btn bs btn-sm" onclick="confirmVerify(${t.id})">✓ Verify</button>
        <button class="btn bd btn-sm" onclick="openReject(${t.id})">✕ Reject</button>
      </div>
    </div>`;
  }

  if(t.status==='Rejected'&&(t.assigned_to_user===u.id||(t.self_assigned&&t.created_by===u.id))){
    h=`<div class="wbar danger">
      <div>
        <div style="font-size:11px;font-weight:700;color:var(--red);margin-bottom:4px">✕ Rejected</div>
        <div style="font-size:12px;color:var(--t2)">${t.rejection_reason||'No reason given'}</div>
      </div>
      <button class="btn bw btn-sm" onclick="doResubmit(${t.id})">↻ Resubmit</button>
    </div>`;
  }
  // Super Admin sees pending permission requests for this task
  if(role==='superadmin'){
    const pendingReqs=(C.overduePerms||[]).filter(p=>p.task_id===t.id&&p.status==='pending');
    if(pendingReqs.length){
      const reqHtml=pendingReqs.map(p=>{
        const requester=getUser(p.user_id);
        return `<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)">
          <div style="flex:1">
            <span style="font-size:12px;font-weight:600;color:var(--t)">${requester?.name||'User'}</span>
            <span style="font-size:11px;color:var(--t3);margin-left:6px">requested ${ago(p.created_at)}</span>
            ${p.reason?`<div style="font-size:11px;color:var(--t2);margin-top:2px">"${p.reason}"</div>`:''}
          </div>
          <button class="btn bs btn-sm" onclick="approvePermission(${p.id},${t.id})">✓ Approve</button>
          <button class="btn bd btn-sm" onclick="denyPermission(${p.id},${t.id})">✕ Deny</button>
        </div>`;
      }).join('');
      h+=`<div class="wbar" style="flex-direction:column;align-items:stretch">
        <div style="font-size:11px;font-weight:700;color:var(--amber);margin-bottom:8px">🔑 Overdue Permission Requests (${pendingReqs.length})</div>
        ${reqHtml}
      </div>`;
    }
  }

  return h;
}

// ── RECURRING TASK SPAWNER ──
async function spawnRecurring(completedTask){
  const t=completedTask;
  const durations={Daily:1, Weekly:7, Monthly:30, 'Branch Audit':7};
  const daysToAdd=durations[t.type]||7;
  const baseDate=t.due_date||today();
  const nextDue=new Date(baseDate);
  nextDue.setDate(nextDue.getDate()+daysToAdd);
  const nextDueFmt=nextDue.toISOString().slice(0,10);

  const payload={
    title: t.title,
    description: t.description||'',
    type: t.type,
    priority: t.priority,
    due_date: nextDueFmt,
    status: t.assigned_to?'Assigned':(t.assigned_to_user?'In Progress':'Created'),
    created_by: t.created_by,
    assigned_to: t.assigned_to||null,
    assigned_to_user: t.assigned_to_user||null,
    assigned_by: t.assigned_by||null,
    self_assigned: t.self_assigned,
    recurring: true
  };
  const {data:newTask,error}=await sb.from('tasks').insert(payload).select().single();
  if(!error&&newTask){
    toast(`↻ Recurring: next ${t.type==='Branch Audit'?'Weekly Audit':t.type} task created for ${nextDueFmt}`,'in');
    // Copy branches for Branch Audit recurring tasks (fresh checklist, same branch list)
    if(t.type==='Branch Audit'){
      const oldBranches=C.auditBranches[t.id]||[];
      if(oldBranches.length){
        const newBranches=oldBranches.map((b,i)=>({task_id:newTask.id, branch_name:b.branch_name, sort_order:i}));
        const {data:nb}=await sb.from('audit_branches').insert(newBranches).select();
        C.auditBranches[newTask.id]=nb||[];
      }
    }
    if(t.assigned_to) await addNotif(t.assigned_to,`Recurring task renewed: <strong>${t.title}</strong>`,'↻','assign');
    if(t.assigned_to_user&&t.assigned_to_user!==t.assigned_to) await addNotif(t.assigned_to_user,`Recurring task renewed: <strong>${t.title}</strong>`,'↻','assign');
  }
}

// ── OVERDUE PERMISSION SYSTEM ──
async function requestOverduePermission(taskId){
  const reason=prompt('Optional: Add a reason for your late submission request:');
  if(reason===null) return; // cancelled

  // Check not already requested
  if(hasPendingPermRequest(taskId)){ toast('Request already sent','wa'); return; }

  const payload={
    task_id:    taskId,
    user_id:    CU.id,
    status:     'pending',
    reason:     reason?.trim()||'',
    created_at: new Date().toISOString()
  };
  const {data,error}=await sb.from('overdue_permissions').insert(payload).select().single();
  if(error){ toast('Failed to send request','er'); return; }

  C.overduePerms.push(data);

  // Notify all superadmins
  const superadmins=allUsers().filter(u=>u.role==='superadmin');
  const t=allTasks().find(x=>x.id===taskId);
  for(const sa of superadmins){
    await addNotif(sa.id,`🔑 <strong>${CU.name}</strong> requests permission to submit overdue task: <strong>${t?.title||'Task'}</strong>`,'🔑','permission');
  }

  toast('Permission request sent to Super Admin ✓','in');
  const tsk=allTasks().find(x=>x.id===taskId);
  if(tsk) renderDetail(tsk);
}

async function approvePermission(permId,taskId){
  const {error}=await sb.from('overdue_permissions').update({status:'approved',reviewed_by:CU.id,reviewed_at:new Date().toISOString()}).eq('id',permId);
  if(error){ toast('Failed','er'); return; }

  // Update local cache
  const perm=(C.overduePerms||[]).find(p=>p.id===permId);
  if(perm) perm.status='approved';

  // Notify the user
  const t=allTasks().find(x=>x.id===taskId);
  const permRow=(C.overduePerms||[]).find(p=>p.id===permId);
  if(permRow){
    await addNotif(permRow.user_id,`✅ Permission approved! You can now submit: <strong>${t?.title||'Task'}</strong>`,'✅','permission');
    // Reload perms for that user in our local cache
    const {data:fresh}=await sb.from('overdue_permissions').select('*').eq('user_id',permRow.user_id);
    C.overduePerms=fresh||[];
  }

  toast('Permission approved ✓');
  await refreshTasks();
  const tsk=allTasks().find(x=>x.id===taskId);
  if(tsk) renderDetail(tsk);
}

async function denyPermission(permId,taskId){
  const reason=prompt('Reason for denial (optional):');
  if(reason===null) return;
  const {error}=await sb.from('overdue_permissions').update({status:'denied',reviewed_by:CU.id,reviewed_at:new Date().toISOString(),deny_reason:reason?.trim()||''}).eq('id',permId);
  if(error){ toast('Failed','er'); return; }

  const perm=(C.overduePerms||[]).find(p=>p.id===permId);
  if(perm){
    perm.status='denied';
    const t=allTasks().find(x=>x.id===taskId);
    await addNotif(perm.user_id,`❌ Permission denied for: <strong>${t?.title||'Task'}</strong>${reason?` — ${reason}`:''}`, '❌','permission');
  }

  toast('Permission denied');
  const tsk=allTasks().find(x=>x.id===taskId);
  if(tsk) renderDetail(tsk);
}

async function doDelete(id){
  const t=allTasks().find(x=>x.id===id); if(!t){ toast('Not found','er'); return; }
  const canDo=['superadmin','admin'].includes(CU.role)||(CU.role==='subadmin'&&t.created_by===CU.id);
  if(!canDo){ toast('No permission','er'); return; }
  if(!confirm(`Delete "${t.title}"? This cannot be undone.`)) return;
  const {error}=await sb.from('tasks').delete().eq('id',id);
  if(error){ toast('Failed','er'); return; }
  toast('Task deleted'); closeM('modal-detail'); await refreshTasks();
}

async function postCmt(){
  const inp=document.getElementById('cmt-inp');
  const txt=inp?.value?.trim(); if(!txt||!curTaskId) return;
  inp.value='';
  await sb.from('comments').insert({task_id:curTaskId,user_id:CU.id,text:txt,type:'normal'});
  const {data:cmts}=await sb.from('comments').select('*').eq('task_id',curTaskId).order('created_at');
  C.comments=C.comments.filter(c=>c.task_id!==curTaskId).concat(cmts||[]);
  const t=allTasks().find(x=>x.id===curTaskId); if(t) renderDetail(t);
}

function addMemoRow(taskId){
  if(!C._auditMemos) C._auditMemos={};

async function saveAuditChecklist(taskId){
  const branches=C.auditBranches[taskId]||[];
  if(!branches.length){ toast('No branches','er'); return; }
  const btn=document.querySelector('.audit-save-bar button');
  if(btn){ btn.disabled=true; btn.textContent='Saving…'; }

  let anyError=false;
  for(const b of branches){
    const billToggle=document.querySelector(`.audit-toggle button.dash.active[data-branch="${b.id}"][data-col="bill"]`);
    const gcToggle  =document.querySelector(`.audit-toggle button.dash.active[data-branch="${b.id}"][data-col="gc"]`);
    const mfCb      =document.getElementById('mf-cb-'+b.id);
    const billInp   =document.getElementById('bill-inp-'+b.id);
    const gcInp     =document.getElementById('gc-inp-'+b.id);
    const mfInp     =document.getElementById('mf-inp-'+b.id);

    const payload={
      branch_id:    b.id,
      task_id:      taskId,
      bill_status:  billToggle ? '-' : 'ok',
      bill_numbers: billInp?.value?.trim()||'',
      gc_status:    gcToggle ? '-' : 'ok',
      gc_numbers:   gcInp?.value?.trim()||'',
      mf_missing:   mfCb ? mfCb.checked : false,
      mf_numbers:   mfInp?.value?.trim()||'',
      updated_by:   CU.id,
      updated_at:   new Date().toISOString()
    };

    const existing=(C._auditByBranch&&C._auditByBranch[b.id])||Object.values(C.auditChecklist).find(x=>x.branch_id===b.id);
    let res;
    if(existing?.id){
      res=await sb.from('audit_checklist').update(payload).eq('id',existing.id).select().single();
    } else {
      res=await sb.from('audit_checklist').insert(payload).select().single();
    }
    if(res.error){ anyError=true; continue; }
    if(res.data){
      C.auditChecklist[res.data.id]=res.data;
      if(!C._auditByBranch) C._auditByBranch={};
      C._auditByBranch[b.id]=res.data;
    }
  }

  // Save memo rows
  const memos=C._auditMemos&&C._auditMemos[taskId]?C._auditMemos[taskId]:[];
  const savedMemos=memos.map((m,i)=>({
    particular: document.getElementById('memo-part-'+i)?.value?.trim()||'',
    amount:     parseFloat(document.getElementById('memo-amt-'+i)?.value)||0
  })).filter(m=>m.particular||m.amount);
  // Store memos as JSON in task description extension — upsert to audit_memos table
  if(savedMemos.length){
    await sb.from('audit_memos').upsert({task_id:taskId, memos:JSON.stringify(savedMemos), updated_by:CU.id},{onConflict:'task_id'});
    if(!C._auditMemos) C._auditMemos={};
    C._auditMemos[taskId]=savedMemos;
  }

  if(btn){ btn.disabled=false; btn.textContent='💾 Save Checklist'; }
  anyError ? toast('Some rows failed','wa') : toast('Checklist saved ✓');
  const t=allTasks().find(x=>x.id===taskId); if(t) renderDetail(t);
}

async function loadPicklistBranches(){
  // Load globally known branches from any existing audit task as suggestions
  const {data} = await sb.from('audit_branches').select('branch_name').order('branch_name');
  const seen = new Set();
  _picklistBranches = [];
  (data||[]).forEach(b=>{ if(!seen.has(b.branch_name)){ seen.add(b.branch_name); _picklistBranches.push(b.branch_name); } });
  renderBranchPicker();
}

function renderBranchPicker(){
  const el = document.getElementById('audit-branch-picker');
  if(!el) return;
  if(!_picklistBranches.length){
    el.innerHTML='<div style="color:var(--t3);font-size:11px;padding:6px 4px">No branches yet. Add branches below.</div>';
    return;
  }
  el.innerHTML = _picklistBranches.map((name,i)=>`
    <div class="branch-pick-item">
      <input type="checkbox" id="bpick-${i}" value="${name}" checked>
      <label for="bpick-${i}" style="cursor:pointer;flex:1">${name}</label>
    </div>`).join('');
}

function addBranchToPicklist(){
  const inp = document.getElementById('new-branch-inp');
  const name = inp?.value?.trim();
  if(!name){ toast('Enter branch name','er'); return; }
  if(_picklistBranches.includes(name)){ toast('Branch already in list','wa'); return; }
  _picklistBranches.push(name);
  inp.value='';
  renderBranchPicker();
}

function onTaskTypeChange(val){
  const auditGrp = document.getElementById('audit-branch-grp');
  const recurGrp = document.getElementById('recurring-grp');
  if(val==='Branch Audit'){
    auditGrp.style.display='flex';
    auditGrp.style.flexDirection='column';

    document.getElementById('t-recurring').value='true';

    loadPicklistBranches();
  } else {

  }

function populateAssignDropdown(t){
  const assignGrp=document.getElementById('assign-grp');
  const sel=document.getElementById('t-assign');
  if(['superadmin','admin'].includes(CU.role)){
    const s=allUsers().filter(x=>x.role==='subadmin'&&x.active);
    const u=allUsers().filter(x=>x.role==='user'&&x.active);
    sel.innerHTML=`<option value="">— Unassigned —</option>
      <optgroup label="Sub Admins">${s.map(x=>`<option value="sub-${x.id}">${x.name} (Sub Admin)</option>`).join('')}</optgroup>
      <optgroup label="Users">${u.map(x=>`<option value="usr-${x.id}">${x.name} (User)</option>`).join('')}</optgroup>`;
    assignGrp.style.display='flex';
    if(t){
      if(t.assigned_to) sel.value=`sub-${t.assigned_to}`;
      else if(t.assigned_to_user) sel.value=`usr-${t.assigned_to_user}`;
    }
  } else if(CU.role==='subadmin'){
    const u=allUsers().filter(x=>x.role==='user'&&x.active);
    sel.innerHTML=`<option value="">— Unassigned —</option>${u.map(x=>`<option value="usr-${x.id}">${x.name}</option>`).join('')}`;
    assignGrp.style.display='flex';
    if(t?.assigned_to_user) sel.value=`usr-${t.assigned_to_user}`;
  } else {
    assignGrp.style.display='none';
  }
}

async function saveTask(){
  const title=document.getElementById('t-title').value.trim();
  if(!title){ toast('Title required','er'); return; }
  const due=document.getElementById('t-due').value;
  if(!due){ toast('Due date required','er'); return; }
  const taskType=document.getElementById('t-type').value;
  const av=document.getElementById('t-assign').value;
  const recurring=document.getElementById('t-recurring').value==='true';
  let assigned_to=null, assigned_to_user=null, status='Created';
  if(av.startsWith('sub-')){ assigned_to=parseInt(av.slice(4)); status='Assigned'; }
  else if(av.startsWith('usr-')){ assigned_to_user=parseInt(av.slice(4)); status='In Progress'; }

  // Validate Branch Audit branches
  if(taskType==='Branch Audit'&&!editTaskId){
    const picked=Array.from(document.querySelectorAll('#audit-branch-picker input[type=checkbox]:checked')).map(c=>c.value);
    if(!picked.length){ toast('Select at least one branch','er'); return; }
  }

  const btn=document.getElementById('task-save-btn');
  btn.disabled=true; btn.textContent='Saving…';

  if(editTaskId){
    const payload={title, description:document.getElementById('t-desc').value.trim(),
      type:taskType, priority:document.getElementById('t-priority').value,
      due_date:due, recurring, updated_at:new Date().toISOString()};
    const {error}=await sb.from('tasks').update(payload).eq('id',editTaskId);
    btn.disabled=false; btn.textContent='Save Changes';
    if(error){ toast('Failed: '+error.message,'er'); return; }
    toast('Task updated ✓'); closeM('modal-task'); await refreshTasks();
  } else {
    const payload={title, description:document.getElementById('t-desc').value.trim(),
      type:taskType, priority:document.getElementById('t-priority').value,
      due_date:due, status, created_by:CU.id, assigned_to, assigned_to_user,
      self_assigned:false, recurring};
    const {data,error}=await sb.from('tasks').insert(payload).select().single();
    btn.disabled=false; btn.textContent='Create Task';
    if(error){ toast('Failed: '+error.message,'er'); return; }

    // If Branch Audit — save selected branches
    if(taskType==='Branch Audit'&&data){
      const picked=Array.from(document.querySelectorAll('#audit-branch-picker input[type=checkbox]:checked')).map(c=>c.value);
      const branchRows=picked.map((name,i)=>({task_id:data.id, branch_name:name, sort_order:i}));
      const {data:savedBranches}=await sb.from('audit_branches').insert(branchRows).select();
      C.auditBranches[data.id]=savedBranches||[];
    }

    if(assigned_to) await addNotif(assigned_to,`New task assigned: <strong>${title}</strong>`,'◈','assign');
    if(assigned_to_user) await addNotif(assigned_to_user,`New task assigned: <strong>${title}</strong>`,'⚡','assign');
    toast('Task created ✓'); closeM('modal-task'); await refreshTasks();
  }
}

async function saveSelf(){
  const title=document.getElementById('st-title').value.trim();
  if(!title){ toast('Title required','er'); return; }
  const payload={
    title, description:document.getElementById('st-desc').value.trim(),
    type:document.getElementById('st-type').value,
    priority:document.getElementById('st-priority').value||'Medium',
    due_date:document.getElementById('st-due').value||today(),

  renderMyTasks();
}

function renderUserTasks(){

  const u=allUsers().find(x=>x.id===uid);
